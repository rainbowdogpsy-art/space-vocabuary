<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>太空單字探險家 v3.0 - 彩虹狗狗老師</title>
    <style>
        :root {
            --bg: #05050d;
            --neon: #00f2fe;
            --accent: #ff00de;
            --glass: rgba(15, 15, 35, 0.85);
        }
        body {
            margin: 0; background: var(--bg); color: white;
            font-family: 'Segoe UI', "Microsoft JhengHei", sans-serif;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
            background-image: radial-gradient(white, rgba(255,255,255,.1) 1px, transparent 2px);
            background-size: 100px 100px;
        }
        #game-container {
            width: 90%; max-width: 480px; background: var(--glass);
            backdrop-filter: blur(10px); border-radius: 20px; padding: 25px;
            border: 1px solid rgba(0, 242, 254, 0.3); text-align: center; position: relative;
        }
        /* 狀態列 */
        .header { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
        .lv-tag { background: #ffd700; color: #000; padding: 3px 10px; border-radius: 50px; font-weight: bold; font-size: 0.8em; }
        .exp-bg { flex-grow: 1; height: 8px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; }
        #exp-fill { height: 100%; background: var(--neon); width: 0%; transition: 0.3s; }

        /* 選單與螢幕控制 */
        .screen { display: none; }
        .active { display: block; }
        .menu-title { font-size: 1.8em; color: var(--neon); margin-bottom: 20px; text-shadow: 0 0 10px var(--neon); }
        .btn-mode {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            padding: 18px; border-radius: 12px; margin-bottom: 12px; cursor: pointer; transition: 0.3s; width: 100%;
        }
        .btn-mode:hover { border-color: var(--neon); background: rgba(0,242,254,0.1); transform: translateY(-2px); }

        /* 戰鬥區 */
        .arena { height: 140px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #monster { font-size: 60px; animation: float 3s infinite ease-in-out; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        
        /* 按鈕與輸入 */
        .opt-grid { display: flex; flex-direction: column; gap: 8px; }
        .btn-opt { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); padding: 12px; border-radius: 10px; cursor: pointer; }
        .btn-opt:hover { background: var(--neon); color: black; }
        #spell-in { width: 80%; padding: 12px; font-size: 1.5em; text-align: center; border-radius: 10px; border: none; background: #fff; color: #000; margin-top: 10px; }

        /* 圖鑑區 */
        .library-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; max-height: 250px; overflow-y: auto; padding: 10px; }
        .pet-item { background: rgba(255,255,255,0.05); border-radius: 8px; padding: 5px; border: 1px solid transparent; }
        .pet-img { width: 100%; image-rendering: pixelated; }
        
        .back-btn { position: absolute; top: 15px; left: 15px; background: none; border: 1px solid #555; color: #aaa; cursor: pointer; padding: 2px 8px; border-radius: 5px; z-index: 100; }
    </style>
</head>
<body>

<div id="game-container">
    <div class="header">
        <span class="lv-tag">LV <span id="lv">1</span></span>
        <div class="exp-bg"><div id="exp-fill"></div></div>
    </div>

    <div id="scr-menu" class="screen active">
        <div class="menu-title">🐾 太空單字探險家</div>
        <div class="btn-mode" onclick="startMode('mcq')"><h3>⚔️ 意義選擇戰鬥</h3><p>看英文單字選正確意思</p></div>
        <div class="btn-mode" onclick="startMode('spelling')"><h3>🎧 聽力拼字大戰</h3><p>聽語音並拼出正確單字</p></div>
        <div class="btn-mode" onclick="showLibrary()"><h3>📖 星際圖鑑</h3><p>查看已收集的夥伴與單字</p></div>
    </div>

    <div id="scr-game" class="screen">
        <button class="back-btn" onclick="toHome()">🏠</button>
        <div class="arena"><div id="monster">👾</div><h2 id="display-q"></h2></div>
        <div id="mcq-box" class="opt-grid"></div>
        <div id="spell-box" style="display:none;">
            <p id="spell-hint" style="color:var(--accent); font-weight:bold;"></p>
            <input type="text" id="spell-in" placeholder="輸入拼字..." autocomplete="off">
            <p style="font-size:0.7em; color:#888; margin-top:10px;">按 Enter 送出答案</p>
        </div>
    </div>

    <div id="scr-lib" class="screen">
        <button class="back-btn" onclick="toHome()">🏠</button>
        <h3 style="color:var(--neon);">我的太空夥伴</h3>
        <div id="lib-list" class="library-grid"></div>
        <div id="lib-stats" style="margin-top:15px; font-size:0.8em; color:#aaa;"></div>
    </div>

    <div style="margin-top:20px; border-top:1px solid #333; padding-top:10px; font-size:0.8em; color:#666;">
        孵化進度: <span id="egg-val">0</span>/10
    </div>
</div>

];

// --- 點陣圖資源 ---
const PETS = [
    "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAACAAAAAgCAYAAABzenr0AAAAMUlEQVRYR2NkYGBgYBhEgIHE8BAAoxpGNYxqGNUwqmFUw6iGUQ2jGkY1jGoY1TCYDAAAn08BAt9Pr78AAAAASUVORK5CYII=",
    "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAACAAAAAgCAYAAABzenr0AAAAM0lEQVRYR2NkgID/DAz/GRgYGBhIBY8CMKphVMOohlENoxpGNYxqGNUwqmFUw6iGUQ2D0QAAYL8BAnYmY7UAAAAASUVORK5CYII="
];

let state = { lv: 1, exp: 0, egg: 0, pets: [], mode: "", mastered: 0 };

function save() { localStorage.setItem("space_save_v3", JSON.stringify(state)); }
function load() { 
    const s = localStorage.getItem("space_save_v3");
    if(s) state = JSON.parse(s);
}

let curQ = null;

function updateUI() {
    document.getElementById('lv').innerText = state.lv;
    document.getElementById('exp-fill').style.width = (state.exp % 100) + "%";
    document.getElementById('egg-val').innerText = state.egg;
}

function startMode(m) {
    state.mode = m; showScreen('scr-game');
    document.getElementById('mcq-box').style.display = m === 'mcq' ? 'flex' : 'none';
    document.getElementById('spell-box').style.display = m === 'spelling' ? 'block' : 'none';
    nextQ();
}

function showLibrary() {
    showScreen('scr-lib');
    const list = document.getElementById('lib-list');
    list.innerHTML = state.pets.length ? "" : "<p style='grid-column:span 4;'>尚無夥伴</p>";
    state.pets.forEach(src => {
        const div = document.createElement('div'); div.className = 'pet-item';
        const img = document.createElement('img'); img.src = src; img.className = 'pet-img';
        div.appendChild(img); list.appendChild(div);
    });
    document.getElementById('lib-stats').innerText = `已掌握單字量: ${state.mastered} / ${WORDS.length}`;
}

function toHome() { showScreen('scr-menu'); }
function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

function nextQ() {
    curQ = WORDS[Math.floor(Math.random() * WORDS.length)];
    document.getElementById('display-q').innerText = state.mode === 'mcq' ? curQ.w : "❓❓❓";
    if(state.mode === 'mcq') renderMCQ();
    else {
        document.getElementById('spell-hint').innerText = curQ.m;
        document.getElementById('spell-in').value = "";
        speak(curQ.w); setTimeout(()=>document.getElementById('spell-in').focus(), 300);
    }
}

function renderMCQ() {
    let opts = [curQ.m];
    while(opts.length < 4) {
        let r = WORDS[Math.floor(Math.random()*WORDS.length)].m;
        if(!opts.includes(r)) opts.push(r);
    }
    opts.sort(() => Math.random() - 0.5);
    const box = document.getElementById('mcq-box'); box.innerHTML = "";
    opts.forEach(o => {
        const b = document.createElement('button'); b.className = 'btn-opt'; b.innerText = o; b.onclick = () => check(o); box.appendChild(b);
    });
}

function speak(t) {
    window.speechSynthesis.cancel();
    const m = new SpeechSynthesisUtterance(t); m.lang = 'en-US'; window.speechSynthesis.speak(m);
}

function check(ans) {
    const isS = state.mode === 'spelling';
    const correct = isS ? curQ.w.toLowerCase() : curQ.m;
    const input = isS ? document.getElementById('spell-in').value.toLowerCase().trim() : ans;

    if(input === correct) {
        state.exp += 25; state.egg++; state.mastered++;
        if(state.egg >= 10) { state.pets.push(PETS[Math.floor(Math.random()*PETS.length)]); state.egg = 0; alert("🐣 孵化出新夥伴了！"); }
        if(state.exp >= (state.lv * 100)) { state.lv++; alert("🆙 升級為 LV " + state.lv); }
    } else {
        alert("差一點！正確答案是: " + (isS ? curQ.w : curQ.m));
    }
    save(); updateUI(); nextQ();
}

document.getElementById('spell-in').onkeypress = (e) => { if(e.key === 'Enter') check(); };
window.onload = () => { load(); updateUI(); };
</script>
</body>
</html>
