<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>太空單字探險家 v2.1 - 彩虹狗狗老師</title>
    <style>
        :root {
            --bg-color: #050509;
            --panel-bg: rgba(15, 15, 30, 0.8);
            --primary-neon: #00f2fe;
            --secondary-neon: #4facfe;
            --accent-neon: #ff00de;
            --text-color: #ffffff;
            --gold-color: #ffd700;
        }

        body {
            margin: 0; background-color: var(--bg-color);
            background-image: radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 3px), radial-gradient(white, rgba(255,255,255,.1) 1px, transparent 2px);
            background-size: 550px 550px, 350px 350px;
            animation: starMove 100s linear infinite;
            color: var(--text-color); font-family: 'Segoe UI', "Microsoft JhengHei", sans-serif;
            display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden;
        }

        @keyframes starMove { from {background-position:0 0;} to {background-position:-550px 1100px;} }

        #game-container {
            width: 90%; max-width: 500px; background: var(--panel-bg); backdrop-filter: blur(15px);
            border-radius: 20px; padding: 25px; border: 1px solid rgba(255, 255, 255, 0.1); text-align: center; position: relative;
        }

        .status-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .level-badge { background: linear-gradient(135deg, var(--gold-color), #b8860b); color: #000; padding: 4px 12px; border-radius: 50px; font-weight: bold; font-size: 0.8em; }
        .exp-bar-container { flex-grow: 1; height: 8px; background: rgba(255,255,255,0.05); border-radius: 10px; margin: 0 10px; overflow: hidden; }
        #exp-bar-fill { height: 100%; background: var(--primary-neon); width: 0%; transition: width 0.4s; }

        .menu-title { font-size: 1.8em; margin-bottom: 25px; color: var(--primary-neon); }
        .mode-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 20px; border-radius: 15px; margin-bottom: 15px; cursor: pointer; transition: 0.3s; }
        .mode-card:hover { border-color: var(--primary-neon); background: rgba(0, 242, 254, 0.1); }

        #game-screen { display: none; }
        .battle-arena { height: 150px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #monster-sprite { font-size: 60px; animation: float 3s infinite ease-in-out; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        #options-container { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        .option-btn { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); padding: 12px; border-radius: 10px; cursor: pointer; }
        .option-btn:hover { background: var(--secondary-neon); }

        #spelling-container { display: none; flex-direction: column; align-items: center; gap: 15px; }
        #spell-input { width: 80%; padding: 12px; font-size: 1.5em; text-align: center; border-radius: 10px; border: none; background: #eee; }

        .pet-sprite { width: 40px; height: 40px; image-rendering: pixelated; margin: 4px; }
        #pet-list { display: flex; justify-content: center; flex-wrap: wrap; margin-top: 10px; min-height: 48px; }
        .back-btn { position: absolute; top: 15px; left: 15px; background: none; border: 1px solid #555; color: #aaa; cursor: pointer; padding: 2px 8px; border-radius: 5px; }
    </style>
</head>
<body>

<div id="game-container">
    <div class="status-header">
        <span class="level-badge">LV <span id="lv">1</span></span>
        <div class="exp-bar-container"><div id="exp-bar-fill"></div></div>
        <span style="font-size: 0.8em;"><span id="exp-txt">0</span>/100</span>
    </div>

    <div id="menu-screen">
        <div class="menu-title">🐾 太空單字探險家</div>
        <div class="mode-card" onclick="startMode('mcq')"><h3>⚔️ 選擇題戰鬥</h3><p>看英文選中文</p></div>
        <div class="mode-card" onclick="startMode('spelling')"><h3>🎧 拼字大戰</h3><p>聽發音拼單字</p></div>
    </div>

    <div id="game-screen">
        <button class="back-btn" onclick="goHome()">🏠選單</button>
        <div class="battle-arena"><div id="monster-sprite">👾</div><h2 id="current-display"></h2></div>
        <div id="options-container"></div>
        <div id="spelling-container">
            <p>提示：<span id="spell-hint"></span></p>
            <input type="text" id="spell-input" placeholder="輸入拼字..." autocomplete="off">
        </div>
    </div>

    <div id="collection-panel" style="margin-top:20px; border-top:1px solid #333; padding-top:10px;">
        <div style="font-size:0.8em; color:#aaa;">夥伴蛋孵化 (<span id="egg-progress-txt">0</span>/10)</div>
        <div id="pet-list">掃描中...</div>
    </div>
</div>

<script>
const ALL_WORDS = [
    {word: "afternoon", meaning: "下午"}, {word: "funny", meaning: "有趣的"}, {word: "giraffe", meaning: "長頸鹿"}, {word: "aunt", meaning: "阿姨"}, {word: "angry", meaning: "生氣的"}, {word: "animal", meaning: "動物"}, {word: "ant", meaning: "螞蟻"}, {word: "arm", meaning: "手臂"}, {word: "ax", meaning: "斧頭"}, {word: "bathroom", meaning: "浴室"}, {word: "bear", meaning: "熊"}, {word: "cute", meaning: "可愛的"}, {word: "dog", meaning: "狗"}, {word: "cat", meaning: "貓"}, {word: "apple", meaning: "蘋果"}, {word: "banana", meaning: "香蕉"}, {word: "zebra", meaning: "斑馬"}
];

// 精簡後的點陣圖
const PET_LIB = {
    p1: "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAACAAAAAgCAYAAABzenr0AAAAMElEQVRYR2NkYGBgYBhEgIHE8BAAoxpGNYxqGNUwqmFUw6iGUQ2jGkY1jGoY1TCYDAAAn08BAt9Pr78AAAAASUVORK5CYII=",
    p2: "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAACAAAAAgCAYAAABzenr0AAAAM0lEQVRYR2NkgID/DAz/GRgYGBhIBY8CMKphVMOohlENoxpGNYxqGNUwqmFUw6iGUQ2D0QAAYL8BAnYmY7UAAAAASUVORK5CYII="
};

let gameState = { lv: 1, exp: 0, expNeed: 100, egg: 0, pets: [], mode: "" };

function save() { localStorage.setItem("vocab_save_v2", JSON.stringify(gameState)); }
function load() { 
    const s = localStorage.getItem("vocab_save_v2");
    if(s) gameState = JSON.parse(s);
}

let currentQ = null;

function updateUI() {
    document.getElementById('lv').innerText = gameState.lv;
    document.getElementById('exp-txt').innerText = gameState.exp;
    document.getElementById('exp-bar-fill').style.width = (gameState.exp/gameState.expNeed*100) + "%";
    document.getElementById('egg-progress-txt').innerText = gameState.egg;
    const list = document.getElementById('pet-list');
    list.innerHTML = gameState.pets.length ? "" : "尚未獲得夥伴";
    gameState.pets.forEach(id => {
        const img = document.createElement('img'); img.src = PET_LIB.p1; img.className = 'pet-sprite'; list.appendChild(img);
    });
}

function startMode(m) {
    gameState.mode = m;
    document.getElementById('menu-screen').style.display = 'none';
    document.getElementById('game-screen').style.display = 'block';
    if(m === 'mcq') {
        document.getElementById('options-container').style.display = 'flex';
        document.getElementById('spelling-container').style.display = 'none';
    } else {
        document.getElementById('options-container').style.display = 'none';
        document.getElementById('spelling-container').style.display = 'flex';
    }
    nextQ();
}

function goHome() {
    document.getElementById('menu-screen').style.display = 'block';
    document.getElementById('game-screen').style.display = 'none';
}

function nextQ() {
    currentQ = ALL_WORDS[Math.floor(Math.random() * ALL_WORDS.length)];
    if(gameState.mode === 'mcq') {
        document.getElementById('current-display').innerText = currentQ.word;
        renderMCQ();
    } else {
        document.getElementById('current-display').innerText = "❓❓❓";
        document.getElementById('spell-hint').innerText = currentQ.meaning;
        document.getElementById('spell-input').value = "";
        speak(currentQ.word);
    }
}

function renderMCQ() {
    let opts = [currentQ.meaning];
    while(opts.length < 3) {
        let r = ALL_WORDS[Math.floor(Math.random()*ALL_WORDS.length)].meaning;
        if(!opts.includes(r)) opts.push(r);
    }
    opts.sort(() => Math.random() - 0.5);
    const con = document.getElementById('options-container');
    con.innerHTML = "";
    opts.forEach(o => {
        const b = document.createElement('button'); b.className = 'option-btn'; b.innerText = o; b.onclick = () => check(o); con.appendChild(b);
    });
}

function speak(t) {
    const m = new SpeechSynthesisUtterance(t); m.lang = 'en-US'; window.speechSynthesis.speak(m);
}

function check(ans) {
    const isS = (gameState.mode === 'spelling');
    const correct = isS ? currentQ.word.toLowerCase() : currentQ.meaning;
    const input = isS ? document.getElementById('spell-input').value.toLowerCase().trim() : ans;

    if(input === correct) {
        gameState.exp += 30; gameState.egg++;
        if(gameState.egg >= 10) { gameState.pets.push("p1"); gameState.egg = 0; alert("🐣 孵化成功！"); }
        if(gameState.exp >= gameState.expNeed) { gameState.lv++; gameState.exp = 0; alert("🆙 升級！"); }
    } else {
        alert("答案是: " + correct);
    }
    save(); updateUI(); nextQ();
}

document.getElementById('spell-input').addEventListener('keypress', (e) => {
    if(e.key === 'Enter') check();
});

window.onload = () => { load(); updateUI(); };
</script>
</body>
</html>
