<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>太空單字探險家 v14.0 - 32-bit 精裝版</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div class="header">
            <div id="player-avatar" class="avatar-box"></div>
            <div class="header-info">
                <div class="lv-row">
                    <span class="lv-tag">LV <span id="lv">1</span></span>
                    <span id="display-title" class="user-title">探險成員</span>
                </div>
                <div id="display-name">探險家</div>
                <div class="exp-bg"><div id="exp-fill"></div></div>
            </div>
        </div>

        <div id="screens">
            <div id="scr-menu" class="screen active">
                <h2 style="color:#00f2fe; margin:10px 0; font-size:1.2em;">🐾 探險終端 v14.0</h2>
                <div class="menu-grid">
                    <button class="btn-mode" onclick="window.showStoryList()">📖 冒險百科</button>
                    <button class="btn-mode" onclick="window.startReview()">📡 星際廣播</button>
                    <button class="btn-mode" onclick="window.showSettings()">🛰️ 角色設定</button>
                    <button class="btn-mode" onclick="window.showLeaderboard()">🏆 榮譽榜</button>
                </div>
                <button id="btn-daily" class="btn-daily" onclick="window.startDaily()">📅 每日挑戰 (雙倍經驗)</button>
                <div class="menu-grid">
                    <button class="btn-game" onclick="window.startMode('mcq')">⚔️ 選擇題</button>
                    <button class="btn-game" onclick="window.startMode('spelling')">🎧 拼字戰</button>
                </div>
            </div>
            <div id="scr-settings" class="screen"></div>
            <div id="scr-game" class="screen"></div>
            <div id="scr-rank" class="screen"></div>
            <div id="scr-story-list" class="screen"></div>
            <div id="scr-story-read" class="screen"></div>
            <div id="scr-review" class="screen"></div>
        </div>
        <div id="footer-egg">夥伴能量: <span id="egg-val">0</span> / 10</div>
    </div>
    <script src="script.js"></script>
</body>
</html>
