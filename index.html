<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>太空單字探險家 v8.0 - 彩虹狗老師</title>
    <style>
        :root {
            --bg: #05050d; --neon: #00f2fe; --accent: #ff00de; --glass: rgba(20, 20, 45, 0.95);
        }
        body {
            margin: 0; background: var(--bg); color: white;
            font-family: 'Segoe UI', "Microsoft JhengHei", sans-serif;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
            background-image: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
        }
        #game-container {
            width: 90%; max-width: 440px; background: var(--glass);
            backdrop-filter: blur(15px); border-radius: 24px; padding: 20px;
            border: 1px solid rgba(0, 242, 254, 0.3); text-align: center; position: relative;
        }
        /* 狀態列排版：加入頭像顯示 */
        .header { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 12px; }
        .avatar-box { width: 60px; height: 60px; background: rgba(0,0,0,0.5); border-radius: 12px; border: 1px solid var(--neon); display: flex; align-items: center; justify-content: center; flex-shrink: 0; box-shadow: 0 0 10px rgba(0,242,254,0.2); }
        .avatar-svg { width: 50px; height: 50px; image-rendering: pixelated; }
        .header-content { flex-grow: 1; text-align: left; }
        .lv-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .lv-tag { background: linear-gradient(45deg, #ffd700, #ffa500); color: #000; padding: 2px 10px; border-radius: 50px; font-weight: bold; font-size: 0.75em; }
        .user-title { color: var(--neon); font-size: 0.8em; font-weight: bold; }
        .exp-bg { width: 100%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; border: 1px solid #333; }
        #exp-fill { height: 100%; background: var(--neon); width: 0%; transition: width 0.4s; }

        .screen { display: none; animation: fadeIn 0.3s; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .btn-mode {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            padding: 14px; border-radius: 12px; margin-bottom: 8px; cursor: pointer; transition: 0.3s; width: 100%; color: white;
        }
        .btn-mode:hover { border-color: var(--neon); background: rgba(0,242,254,0.1); transform: translateY(-2px); }
        .btn-mode h3 { margin: 0 0 3px 0; font-size: 1.05em; }
        .btn-mode p { margin: 0; font-size: 0.7em; color: #aaa; }

        .arena { height: 100px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #monster { font-size: 50px; animation: float 3s infinite ease-in-out; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        
        .btn-opt { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); padding: 12px; border-radius: 12px; cursor: pointer; margin-bottom: 8px; width: 100%; }
        .btn-opt:hover { background: var(--neon); color: #000; font-weight: bold; }
        
        #spell-in { width: 85%; padding: 12px; font-size: 1.5em; text-align: center; border-radius: 15px; border: 2px solid var(--neon); background: #000; color: var(--neon); outline: none; font-family: monospace; }
        
        /* 性別選擇 */
        .gender-box { display: flex; gap: 10px; justify-content: center; margin: 15px 0; }
        .btn-gender { flex: 1; padding: 10px; border-radius: 10px; border: 1px solid #444; background: rgba(255,255,255,0.05); color: #888; cursor: pointer; }
        .btn-gender.active { border-color: var(--neon); color: var(--neon); background: rgba(0,242,254,0.1); font-weight: bold; }

        .lib-list { display: flex; flex-direction: column; gap: 8px; max-height: 280px; overflow-y: auto; padding: 5px; text-align: left; }
        .pet-card { background: rgba(255, 255, 255, 0.08); border-radius: 15px; padding: 10px; border: 1px solid #444; display: flex; align-items: center; gap: 12px; }
        .back-btn { background: rgba(255,255,255,0.1); border: 1px solid #555; color: #fff; cursor: pointer; padding: 6px 12px; border-radius: 8px; font-size: 0.8em; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="game-container">
    <div class="header">
        <div id="player-avatar" class="avatar-box"></div>
        <div class="header-content">
            <div class="lv-info">
                <div>
                    <span class="lv-tag">RANK LV <span id="lv">1</span></span>
                    <div id="display-title" class="user-title">萌新實習生</div>
                </div>
                <span id="display-name" style="font-size: 0.8em; color: #fff; font-weight:bold;">探險家</span>
            </div>
            <div class="exp-bg"><div id="exp-fill"></div></div>
        </div>
    </div>

    <div id="scr-menu" class="screen active">
        <h2 style="color:var(--neon); margin-bottom:12px; text-shadow:0 0 10px var(--neon);">🐾 太空探險家 v8.0</h2>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px;">
            <button class="btn-mode" onclick="showSettings()"><h3>🛰️ 角色設定</h3><p>性別與形象切換</p></button>
            <button class="btn-mode" onclick="showLeaderboard()"><h3>🏆 榮譽榜</h3><p>全校探險排行</p></button>
        </div>
        <button class="btn-mode" onclick="startDaily()" style="background:rgba(255,215,0,0.15); border-color:#ffd700;"><h3>📅 每日挑戰</h3><p id="daily-status">15 題挑戰領雙倍獎勵</p></button>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px;">
            <button class="btn-mode" onclick="startMode('mcq')"><h3>⚔️ 選擇題</h3><p>10連擊挑戰</p></button>
            <button class="btn-mode" onclick="startMode('spelling')"><h3>🎧 拼字戰</h3><p>累積10題挑戰</p></button>
        </div>
        <button class="btn-mode" onclick="showStoryList()"><h3>📖 故事模式</h3><p>已解鎖的 15 篇章</p></button>
        <button class="btn-mode" onclick="showLibrary()"><h3>🐾 夥伴圖鑑</h3><p>檢視小隊成員</p></button>
    </div>

    <div id="scr-settings" class="screen">
        <div style="text-align:left;"><button class="back-btn" onclick="toHome()">🏠 返回</button></div>
        <h3 style="color:var(--neon);">角色終端設置</h3>
        <p style="font-size:0.8em; color:#aaa; margin-bottom:5px;">性別與形象切換：</p>
        <div class="gender-box">
            <button id="gen-m" class="btn-gender" onclick="setGender('M')">男生形象</button>
            <button id="gen-f" class="btn-gender" onclick="setGender('F')">女生形象</button>
        </div>
        <p style="font-size:0.8em; color:#aaa; margin-bottom:5px;">自定義名稱：</p>
        <input type="text" id="name-in" style="background:#000; border:1px solid #444; color:#fff; padding:12px; border-radius:10px; width:80%; text-align:center; margin-bottom:15px;" maxlength="8">
        <button class="btn-opt" onclick="saveSettings()">確認同步</button>
    </div>

    <div id="scr-game" class="screen">
        <div style="text-align:left;"><button class="back-btn" onclick="toHome()">🏠 退出</button></div>
        <div id="hatch-hint" style="color:var(--neon); font-size:0.8em; margin-bottom:5px;"></div>
        <div class="arena"><div id="monster">👾</div><h2 id="display-q"></h2></div>
        <div id="mcq-box" style="display:flex; flex-direction:column;"></div>
        <div id="spell-box" style="display:none;"><p id="spell-hint" style="color:var(--accent); font-weight:bold;"></p><input type="text" id="spell-in" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" placeholder="請拼寫代碼..."></div>
    </div>

    <div id="scr-rank" class="screen"><div style="text-align:left;"><button class="back-btn" onclick="toHome()">🏠 返回</button></div><h3 style="color:var(--neon);">🏆 星際榮譽榜</h3><div id="rank-list" class="lib-list" style="background:rgba(0,0,0,0.3); border-radius:15px; padding:10px;"></div></div>
    <div id="scr-story-list" class="screen"><div style="text-align:left;"><button class="back-btn" onclick="toHome()">🏠 返回</button></div><div id="story-list" class="lib-list"></div></div>
    <div id="scr-story-read" class="screen"><div style="text-align:left;"><button class="back-btn" onclick="showStoryList()">⬅️ 返回</button></div><h3 id="story-title" style="color:var(--neon);"></h3><div id="story-content" style="background:rgba(0,0,0,0.5); padding:20px; border-radius:15px; border:1px solid var(--accent); line-height:1.6; text-align:left; font-size:0.9em; max-height:200px; overflow-y:auto;"></div></div>
    <div id="scr-lib" class="screen"><div style="text-align:left;"><button class="back-btn" onclick="toHome()">🏠 返回</button></div><div id="lib-list" class="lib-list"></div></div>

    <div style="margin-top:10px; border-top:1px solid #333; padding-top:10px; font-size:0.8em; color:#888;">夥伴能量: <span id="egg-val">0</span> / 10</div>
</div>

<script>
// --- 角色視覺資料庫 (SVG) ---
const AVATARS = {
    M: [
        '<svg viewBox="0 0 10 10" class="avatar-svg"><path d="M3 2h4v5H3z" fill="#00f2fe"/><path d="M3 7h4v2H3z" fill="#333"/><path d="M4 3h1v1H4zm1 0h1v1H5z" fill="#000"/></svg>', // Tier 1
        '<svg viewBox="0 0 10 10" class="avatar-svg"><path d="M3 2h4v5H3z" fill="#00f2fe"/><rect x="2" y="3" width="6" height="2" fill="#ff00de" opacity="0.6"/><path d="M4 8h2v2H4z" fill="#ff00de"/></svg>', // Tier 2
        '<svg viewBox="0 0 10 10" class="avatar-svg"><path d="M3 1h4v7H3z" fill="#ffd700"/><circle cx="5" cy="5" r="4" fill="none" stroke="#00f2fe" stroke-width="0.5"/><path d="M4 3h2v1H4z" fill="#000"/></svg>' // Tier 3
    ],
    F: [
        '<svg viewBox="0 0 10 10" class="avatar-svg"><path d="M3 2h4v5H3z" fill="#ff77aa"/><path d="M2 2h6v2H2z" fill="#333"/><path d="M4 4h1v1H4zm1 0h1v1H5z" fill="#000"/></svg>', // Tier 1
        '<svg viewBox="0 0 10 10" class="avatar-svg"><path d="M3 2h4v5H3z" fill="#ff77aa"/><path d="M2 1h6v3H2z" fill="#ff00de" opacity="0.4"/><rect x="4" y="8" width="2" height="2" fill="#00f2fe"/></svg>', // Tier 2
        '<svg viewBox="0 0 10 10" class="avatar-svg"><path d="M3 1h4v7H3z" fill="#ffd700"/><path d="M2 1h6v2H2z" fill="#ff00de"/><circle cx="5" cy="5" r="4" fill="none" stroke="#ff00de" stroke-width="0.5"/></svg>' // Tier 3
    ]
};

const PETS = [{n:"太陽小暖",d:"汪汪星暖男，最愛在雲朵午睡。",s:'<svg class="pet-svg" viewBox="0 0 10 10"><path d="M2 3h1v1H2zm5 0h1v1H7zm-3 4h2v1H4zm-1-3h4v4H3z" fill="#ffd700"/><path d="M3 4h1v1H3zm3 0h1v1H6z" fill="#000"/></svg>',story:"【故事 0-1】你在軌道發現了打呼的小暖，牠送你一顆導航星。"},{n:"星際貓貓",d:"傲嬌領航員，能預知魚罐頭位置。",s:'<svg class="pet-svg" viewBox="0 0 10 10"><path d="M2 2h1v1H2zm5 0h1v1H7zm-5 2h6v4H2z" fill="#a020f0"/><path d="M3 5h1v1H3zm3 0h1v1H6z" fill="#fff"/></svg>',story:"【故事 0-2】貓貓曾是語音號領航員，帶領你尋找能量精靈。"}]; // (此處保留15位設定...)

const WORDS = [{w:"afternoon",m:"下午"},{w:"apple",m:"蘋果"}]; // (保留300單字)

let state = { lv: 1, exp: 0, egg: 0, pets: [], mode: "", mastered: [], name: "探險家", gen: "M", lastD: "" };
let curQ = null, dailyC = 0;

function save() { localStorage.setItem("space_master_v8", JSON.stringify(state)); }
function load() { const s = localStorage.getItem("space_master_v8"); if(s) state = JSON.parse(s); updateUI(); }

function getTitle(lv) {
    if(lv < 6) return "萌新實習生"; if(lv < 11) return "宇宙拾荒者"; if(lv < 21) return "單字搜索官";
    if(lv < 36) return "銀河通訊員"; if(lv < 51) return "星際拓荒者"; return "終極單字神";
}

function updateUI() {
    document.getElementById('lv').innerText = state.lv;
    document.getElementById('exp-val').innerText = state.exp;
    document.getElementById('exp-fill').style.width = (state.exp % 100) + "%";
    document.getElementById('egg-val').innerText = state.egg;
    document.getElementById('display-name').innerText = state.name;
    document.getElementById('display-title').innerText = getTitle(state.lv);
    // 更新頭像：依等級換裝
    let tier = state.lv >= 36 ? 2 : (state.lv >= 11 ? 1 : 0);
    document.getElementById('player-avatar').innerHTML = AVATARS[state.gen][tier];
    const hint = document.getElementById('hatch-hint');
    if(state.mode==='mcq') hint.innerText = "⚔️ 選擇題：需連續答對 10 題連擊！";
    else if(state.mode==='spelling') hint.innerText = "🎧 拼字題：累積答對 10 題即可！";
}

function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
function toHome() { window.speechSynthesis.cancel(); showScreen('scr-menu'); updateUI(); }

function showSettings() { 
    showScreen('scr-settings'); 
    document.getElementById('name-in').value = state.name;
    document.getElementById('gen-m').classList.toggle('active', state.gen === 'M');
    document.getElementById('gen-f').classList.toggle('active', state.gen === 'F');
}
function setGender(g) { state.gen = g; showSettings(); }
function saveSettings() { state.name = document.getElementById('name-in').value || "探險家"; save(); alert("探險家手冊更新成功！"); toHome(); }

function startMode(m) { state.mode = m; state.egg = 0; showScreen('scr-game'); document.getElementById('mcq-box').style.display = m==='mcq'?'flex':'none'; document.getElementById('spell-box').style.display = m==='spelling'?'block':'none'; nextQ(); }

function showLibrary() {
    showScreen('scr-lib'); const list = document.getElementById('lib-list'); list.innerHTML = "";
    if(!state.pets.length) list.innerHTML = "<p style='padding:20px; color:#666;'>尚無夥伴。</p>";
    state.pets.forEach(idx => { const p = PETS[idx] || PETS[0]; const div = document.createElement('div'); div.className = 'pet-card'; div.innerHTML = `<div class="pet-img-box">${p.s}</div><div class="pet-info"><h4>${p.n}</h4><p>${p.d}</p></div>`; list.appendChild(div); });
}

function showStoryList() {
    showScreen('scr-story-list'); const list = document.getElementById('story-list'); list.innerHTML = "";
    if (!state.pets.length) list.innerHTML = "<p style='padding:20px; color:#666;'>解鎖夥伴開啟航誌！</p>";
    else { [...new Set(state.pets)].sort((a,b)=>a-b).forEach(idx => { const p = PETS[idx]; const div = document.createElement('div'); div.className = 'pet-card'; div.style.cursor="pointer"; div.onclick = () => { document.getElementById('story-title').innerText = p.n; document.getElementById('story-content').innerText = p.story; showScreen('scr-story-read'); }; div.innerHTML = `<div class="pet-img-box">${p.s}</div><div class="pet-info"><h4>${p.n} 航誌</h4><p>點擊閱讀冒險故事...</p></div>`; list.appendChild(div); }); }
}

function startReview() { showScreen('scr-review'); /* 複習邏輯... */ }
function startDaily() { state.mode = "daily"; dailyC = 0; state.egg = 0; showScreen('scr-game'); nextQ(); }
function showLeaderboard() { showScreen('scr-rank'); const fake = [{n:"彩虹狗狗老師",l:99,m:300},{n:state.name,l:state.lv,m:state.mastered.length}].sort((a,b)=>b.l-a.l); document.getElementById('rank-list').innerHTML = fake.map((d,i)=>`<div class="rank-item"><span>${i+1}. ${d.n}</span><span>LV ${d.l} (${d.m}詞)</span></div>`).join(""); }

function nextQ() { curQ = WORDS[Math.floor(Math.random() * WORDS.length)]; document.getElementById('display-q').innerText = (state.mode==='mcq' || state.mode==='daily')?curQ.w:"❓❓❓"; if(state.mode==='mcq'||state.mode==='daily') renderMCQ(); else { document.getElementById('mcq-box').innerHTML=""; document.getElementById('spell-hint').innerText=curQ.m; document.getElementById('spell-in').value=""; speak(curQ.w); setTimeout(()=>document.getElementById('spell-in').focus(),300); } updateUI(); }
function renderMCQ() { let opts = [curQ.m]; while(opts.length<4){ let r = WORDS[Math.floor(Math.random()*WORDS.length)].m; if(!opts.includes(r))opts.push(r);} opts.sort(()=>Math.random()-0.5); const box=document.getElementById('mcq-box'); box.innerHTML=""; opts.forEach(o=>{ const b=document.createElement('button'); b.className='btn-opt'; b.innerText=o; b.onclick=()=>check(o); box.appendChild(b);});}
function speak(t){ window.speechSynthesis.cancel(); const m=new SpeechSynthesisUtterance(t); m.lang='en-US'; m.rate=0.8; window.speechSynthesis.speak(m); }

function check(ans) {
    const isS = state.mode === 'spelling'; const cor = isS ? curQ.w.toLowerCase() : curQ.m; const inp = isS ? document.getElementById('spell-in').value.toLowerCase().trim() : ans;
    if(inp === cor) {
        state.exp += (state.mode==='daily'?10:30); state.egg++; if(!state.mastered.includes(curQ.w))state.mastered.push(curQ.w);
        if(state.mode==='daily' && ++dailyC>=15){ state.exp+=100; state.lastD=new Date().toLocaleDateString(); alert("🎉 完成挑戰！"); toHome(); save(); return;}
        if(state.egg>=10){ const r=Math.floor(Math.random()*PETS.length); state.pets.push(r); state.egg=0; alert(`🐣 孵化成功！獲得夥伴：${PETS[r].n}`); }
    } else {
        if(state.mode==='mcq') { state.egg=0; alert("❌ 連擊中斷！答案: "+curQ.m); }
        else alert("❌ 答案: "+(isS?curQ.w:curQ.m));
    }
    if(state.exp >= (state.lv*100)){ state.lv++; alert("🆙 等級提升與稱號晉升！"); }
    save(); updateUI(); nextQ();
}
document.getElementById('spell-in').onkeydown=(e)=>{if(e.key==='Enter')check();};
window.onload=load;
</script>
</body>
</html>
