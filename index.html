<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>太空單字探險家 v6.0 - 彩虹狗狗老師</title>
    <style>
        :root {
            --bg: #05050d; --neon: #00f2fe; --accent: #ff00de; --glass: rgba(20, 20, 45, 0.9);
        }
        body {
            margin: 0; background: var(--bg); color: white;
            font-family: 'Segoe UI', "Microsoft JhengHei", sans-serif;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
            background-image: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
        }
        #game-container {
            width: 90%; max-width: 440px; background: var(--glass);
            backdrop-filter: blur(15px); border-radius: 24px; padding: 20px;
            border: 1px solid rgba(0, 242, 254, 0.3); text-align: center; position: relative;
        }
        .header { margin-bottom: 15px; }
        .lv-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .lv-tag { background: linear-gradient(45deg, #ffd700, #ffa500); color: #000; padding: 3px 12px; border-radius: 50px; font-weight: bold; font-size: 0.8em; }
        .exp-bg { width: 100%; height: 10px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; border: 1px solid #333; }
        #exp-fill { height: 100%; background: var(--neon); width: 0%; transition: width 0.4s; }

        .screen { display: none; animation: fadeIn 0.3s; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .btn-mode {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            padding: 12px; border-radius: 12px; margin-bottom: 8px; cursor: pointer; transition: 0.3s; width: 100%; color: white;
        }
        .btn-mode:hover { border-color: var(--neon); background: rgba(0,242,254,0.15); transform: translateY(-2px); }
        .btn-mode h3 { margin: 0 0 3px 0; font-size: 1.05em; }
        .btn-mode p { margin: 0; font-size: 0.7em; color: #aaa; }

        .arena { height: 110px; display: flex; flex-direction: column; justify-content: center; align-items: center; margin-bottom: 10px; }
        #monster { font-size: 50px; animation: float 3s infinite ease-in-out; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        
        .btn-opt { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); padding: 12px; border-radius: 12px; cursor: pointer; margin-bottom: 8px; width: 100%; }
        .btn-opt:hover { background: var(--neon); color: #000; font-weight: bold; }
        
        #spell-in { width: 85%; padding: 12px; font-size: 1.5em; text-align: center; border-radius: 15px; border: 2px solid var(--neon); background: #000; color: var(--neon); outline: none; font-family: monospace; }

        .lib-list { display: flex; flex-direction: column; gap: 10px; max-height: 350px; overflow-y: auto; padding: 5px; text-align: left; }
        .pet-card { background: rgba(255, 255, 255, 0.08); border-radius: 15px; padding: 12px; border: 1px solid #444; display: flex; align-items: center; gap: 15px; }
        .pet-img-box { width: 45px; height: 45px; background: rgba(0,0,0,0.4); border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .pet-svg { width: 35px; height: 35px; image-rendering: pixelated; }
        .pet-info { flex-grow: 1; }
        .pet-info h4 { margin: 0; color: var(--neon); font-size: 0.95em; }
        .pet-info p { margin: 4px 0 0 0; font-size: 0.75em; color: #ccc; line-height: 1.4; }

        .back-btn { background: rgba(255,255,255,0.1); border: 1px solid #555; color: #fff; cursor: pointer; padding: 5px 12px; border-radius: 8px; font-size: 0.8em; margin-bottom: 10px; }
        .story-box { background: rgba(0,0,0,0.5); border: 1px solid var(--accent); border-radius: 15px; padding: 20px; line-height: 1.8; text-align: left; font-size: 0.9em; max-height: 250px; overflow-y: auto; }
    </style>
</head>
<body>

<div id="game-container">
    <div class="header">
        <div class="lv-info"><span class="lv-tag">RANK LV <span id="lv">1</span></span><span style="font-size: 0.8em; color: #888;">EXP: <span id="exp-val">0</span></span></div>
        <div class="exp-bg"><div id="exp-fill"></div></div>
    </div>

    <div id="scr-menu" class="screen active">
        <h2 style="color:var(--neon); margin-bottom:15px; text-shadow:0 0 10px var(--neon);">🐾 太空單字探險家</h2>
        <button class="btn-mode" onclick="showStoryList()"><h3>🛰️ 冒險航誌：故事模式</h3><p>隨夥伴解鎖 15 篇星際史詩</p></button>
        <button class="btn-mode" onclick="startReview()"><h3>📡 星際廣播：單字放送</h3><p>觀看複習單字獲得獎勵 EXP</p></button>
        <button class="btn-mode" onclick="startMode('mcq')"><h3>⚔️ 選擇題戰鬥 (10連擊挑戰)</h3><p>答錯即歸零，挑戰極限準度</p></button>
        <button class="btn-mode" onclick="startMode('spelling')"><h3>🎧 聽力拼字 (累積挑戰)</h3><p>手寫練習，累積能量解鎖夥伴</p></button>
        <button class="btn-mode" onclick="showLibrary()"><h3>📖 星際夥伴圖鑑</h3><p>檢視 15 位夥伴與性格設定</p></button>
    </div>

    <div id="scr-game" class="screen">
        <div style="text-align:left;"><button class="back-btn" onclick="toHome()">🏠 返回</button></div>
        <div id="hatch-hint" style="color:var(--neon); font-size:0.8em; margin-bottom:5px;"></div>
        <div class="arena"><div id="monster">👾</div><h2 id="display-q"></h2></div>
        <div id="mcq-box" style="display:flex; flex-direction:column;"></div>
        <div id="spell-box" style="display:none;">
            <p id="spell-hint" style="color:var(--accent); font-weight:bold;"></p>
            <input type="text" id="spell-in" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" placeholder="拼寫單字...">
        </div>
    </div>

    <div id="scr-story-list" class="screen">
        <div style="text-align:left;"><button class="back-btn" onclick="toHome()">🏠 返回</button></div>
        <h3 style="color:var(--accent);">已解鎖的星際篇章</h3>
        <div id="story-list" class="lib-list"></div>
    </div>
    <div id="scr-story-read" class="screen">
        <div style="text-align:left;"><button class="back-btn" onclick="showStoryList()">⬅️ 返回列表</button></div>
        <h3 id="story-title" style="color:var(--neon);"></h3>
        <div id="story-content" class="story-box"></div>
        <button class="btn-opt" style="margin-top:15px;" onclick="showStoryList()">讀完了！</button>
    </div>

    <div id="scr-lib" class="screen">
        <div style="text-align:left;"><button class="back-btn" onclick="toHome()">🏠 返回</button></div>
        <div id="lib-list" class="lib-list"></div>
    </div>

    <div id="scr-review" class="screen">
        <div style="text-align:left;"><button class="back-btn" onclick="toHome()">🏠 返回</button></div>
        <p style="color:var(--neon);">放送中: <span id="rev-idx">1</span>/10</p>
        <div style="background:rgba(0,0,0,0.4); padding:20px; border-radius:15px; border:1px solid var(--neon); margin:10px 0;"><h1 id="rev-word" style="color:var(--neon); margin:0;"></h1><p id="rev-meaning" style="margin-top:10px;"></p></div>
        <button class="btn-opt" id="rev-btn" onclick="nextReviewWord()">下一步</button>
    </div>

    <div style="margin-top:15px; border-top:1px solid #333; padding-top:10px; font-size:0.8em; color:#888;">夥伴孵化能量: <span id="egg-val">0</span> / 10</div>
</div>

<script>
const WORDS = [{w: "afternoon", m: "下午"}, {w: "funny", m: "有趣的"}, {w: "giraffe", m: "長頸鹿"}, {w: "aunt", m: "阿姨"}, {w: "angry", m: "生氣的"}, {w: "animal", m: "動物"}, {w: "ant", m: "螞蟻"}, {w: "arm", m: "手臂"}, {w: "ax", m: "斧頭"}, {w: "bathroom", m: "浴室"}, {w: "bear", m: "熊"}, {w: "cute", m: "可愛的"}, {w: "dog", m: "狗"}, {w: "cat", m: "貓"}, {w: "apple", m: "蘋果"}, {w: "banana", m: "香蕉"}, {w: "zebra", m: "斑馬"}]; // (此處可自由擴充單字)

const PETS = [
    {n: "太陽小暖", d: "汪汪星守護者，散發穩定正能量。", s: '<svg class="pet-svg" viewBox="0 0 10 10"><path d="M2 3h1v1H2zm5 0h1v1H7zm-3 4h2v1H4zm-1-3h4v4H3z" fill="#ffd700"/><path d="M3 4h1v1H3zm3 0h1v1H6z" fill="#000"/></svg>', story: "【冒險 0-1：初遇暖陽】探險家在恆星軌道邊緣救下了能量微弱的小暖。牠原本是星系核心的守護者，卻被黑洞侵蝕。為了報答你，小暖決定指引你尋找失散在銀河各處的探險隊成員。"},
    {n: "星際貓貓", d: "傲嬌領航員，能預知美味能源位置。", s: '<svg class="pet-svg" viewBox="0 0 10 10"><path d="M2 2h1v1H2zm5 0h1v1H7zm-5 2h6v4H2z" fill="#a020f0"/><path d="M3 5h1v1H3zm3 0h1v1H6z" fill="#fff"/></svg>', story: "【冒險 0-2：罐頭星雲】追隨小暖的指引，你在廢棄太空站遇見了貓貓。牠曾是旗艦『語音號』的領航員，正守護著被冰封的物資。貓貓告訴你，想解開能量封印，必須先找到隱藏在冷卻星雲中的精靈。"},
    {n: "青晶靈", d: "宇宙能量化身，指引方向的導師。", s: '<svg class="pet-svg" viewBox="0 0 10 10"><path d="M3 4h4v5H3zm-1 2h6v2H2z" fill="#00f2fe"/><circle cx="4.5" cy="5.5" r="0.5" fill="#000"/><circle cx="6.5" cy="5.5" r="0.5" fill="#000"/></svg>', story: "【冒險 0-3：能量共鳴】在星雲中，青晶靈現身了。牠用純淨能量重新點亮了飛船核心。透過牠的感應，你們接收到了來自遠方熾熱岩漿星球傳來的微弱求救訊號，大家立刻啟程前去救援。"},
    {n: "火紅岩獸", d: "熱愛冒險的堅硬石頭，內心極度溫柔。", s: '<svg class="pet-svg" viewBox="0 0 10 10"><path d="M4 2h2v6H4zM2 4h6v2H2z" fill="#ff3131"/><rect x="4" y="4" width="2" height="2" fill="#fff"/></svg>', story: "【冒險 0-4：岩漿茶會】岩漿星上，火紅岩獸正用身體保護著報廢的機器人。牠獨自守護此地數百年，直到遇見你們。岩獸用溫暖的咖啡款待大家，並決定加入隊伍，與老友一起征服星際。"},
    {n: "機機器人", d: "內建 300 萬種單字庫，最強助教。", s: '<svg class="pet-svg" viewBox="0 0 10 10"><path d="M3 2h4v5H3zm2 5h2v-1H4z" fill="#888"/><rect x="4" y="3" width="2" height="1" fill="#00f2fe"/></svg>', story: "【冒險 0-5：代碼修復】被岩獸守護的正是在『大崩壞』中失蹤的機器人。重新開機後，牠同步了全宇宙單字資料庫。機器人冷靜地分析出：前方有強大電磁風暴，我們需要一位速度極快的夥伴引路。"},
    {n: "閃電雲朵", d: "速度極快的電系精靈，喜歡捉迷藏。", s: '<svg class="pet-svg" viewBox="0 0 10 10"><path d="M2 4h6v2H2zM4 2h2v6H4z" fill="#ffff00"/><path d="M3 4h4v1H3z" fill="#000"/></svg>', story: "【冒險 0-6：閃電追逐】機器人與愛玩的閃電雲達成協定：只要雲朵幫飛船穿過風暴，就分享新奇數據給牠。雲朵開心地成為推進器，但因為跑太快，大家差點撞上了躲在暗處清理垃圾的小傢伙。"},
    {n: "幽靈泡泡", d: "擅長隱身的守護者，默默清理廢墟。", s: '<svg class="pet-svg" viewBox="0 0 10 10"><path d="M3 2h4v6H3zm-1 3h6v3H2z" fill="#e0e0e0" opacity="0.6"/><circle cx="4" cy="4" r="0.5" fill="#000"/></svg>', story: "【冒險 0-7：隱形的守護】穿過風暴後，泡泡現身了。原來牠一直跟在後面清理留下的垃圾。泡泡擅長偽裝，牠帶領隊伍繞過監視器，潛入了一片被神祕種子覆蓋、充滿氧氣的綠色秘境。"},
    {n: "萌翠種子", d: "草系夥伴，能將知識轉化為森林。", s: '<svg class="pet-svg" viewBox="0 0 10 10"><path d="M4 8h2V5H4zm-1-3h4v1H3zm2-3h1v2H5z" fill="#32cd32"/></svg>', story: "【冒險 0-8：綠色星球】在秘境核心，萌翠種子因能量不足枯萎。泡泡用身體保護牠，小暖提供陽光。種子終於開花並釋放氧氣，牠指引大家前往極寒之地，尋找失傳已久的最後防衛核心。"},
    {n: "冰晶企鵝", d: "冷靜守衛，守護星系防衛核心。", s: '<svg class="pet-svg" viewBox="0 0 10 10"><path d="M3 3h4v6H3z" fill="#1e90ff"/><path d="M4 4h1v1H4zm1 0h1v1H5z" fill="#fff"/></svg>', story: "【冒險 0-9：極低溫保存】極寒之地中，企鵝冷靜地守護著核心。牠原以為探險家是掠奪者，直到看見種子開出的友誼之花。企鵝卸下武裝，帶領大家迎接最終的黑洞封印戰。"},
    {n: "金屬巨蟹", d: "最強盾牌，能擊碎空間壓力。", s: '<svg class="pet-svg" viewBox="0 0 10 10"><path d="M2 5h6v3H2zM1 4h2v1H1zm6 0h2v1H7z" fill="#ff4500"/></svg>', story: "【冒險 0-10：鋼鐵守衛】當黑洞壓力席捲而來，金屬巨蟹挺身而出，形成最強盾牌。原來所有夥伴的集結都是為了這一天。在你的單字能量帶領下，大家終於重塑了秩序，準備探索新的領域。"},
    {n: "幻影蝶影", d: "引導靈魂的幻影，能在夢境穿梭。", s: '<svg class="pet-svg" viewBox="0 0 10 10"><path d="M2 3h2v4H2zM6 3h2v4H6zM4 4h2v2H4z" fill="#ff00de"/></svg>', story: "【冒險 0-11：維度裂縫】重塑秩序後，幻影蝶影在時空裂縫中閃現。牠揮動翅膀散發出迷幻鱗粉，揭示了一條通往『單字聖殿』的隱藏路徑。大家發現黑洞之後，竟是一個全新的彩虹維度。"},
    {n: "烈焰龍龍", d: "新維度的守護神，擁有燃燒鬥志。", s: '<svg class="pet-svg" viewBox="0 0 10 10"><path d="M2 5h6v4H2zM4 2h2v3H4z" fill="#ff4500"/><path d="M3 6h1v1H3zm3 0h1v1H6z" fill="white"/></svg>', story: "【冒險 0-12：烈焰試煉】在維度入口，烈焰龍龍擋住了去路。唯有證明自己的單字量與鬥志，才能獲得牠的認可。經過一番激戰，龍龍被大家的默契感動，成為了隊伍中最強大的火力支援。"},
    {n: "時空發條", d: "修正時間漏洞的小精靈，精準無比。", s: '<svg class="pet-svg" viewBox="0 0 10 10"><circle cx="5" cy="5" r="4" fill="#cd7f32"/><path d="M5 3v2h2" stroke="white" fill="none"/></svg>', story: "【冒險 0-13：時空修正】新維度的時間極度混亂，時空發條正忙著修復破碎的齒輪。牠告訴大家，聖殿的大門每百年才開啟一秒，必須依靠牠的精準計時，探險隊才能在正確瞬間進入。"},
    {n: "智慧梟梟", d: "古老遺產紀錄官，知曉全宇宙單字。", s: '<svg class="pet-svg" viewBox="0 0 10 10"><path d="M3 3h4v6H3z" fill="#708090"/><path d="M4 4h1v1H4zm1 0h1v1H5z" fill="yellow"/></svg>', story: "【冒險 0-14：遠古圖書館】智慧梟梟在聖殿門口等待著。牠交給探險家一本空白的航誌，並說：『文字是文明的火種，你們在旅程中收集的每一個夥伴，都是通往終極智慧的鑰匙。』"},
    {n: "虹光獨角獸", d: "奇蹟與和平的象徵，聖殿的最終引導。", s: '<svg class="pet-svg" viewBox="0 0 10 10"><path d="M3 4h4v5H3zM4 2h1v2H4z" fill="#e0ffff"/><path d="M4 2h1v1H4z" fill="#ffd700"/></svg>', story: "【冒險 0-15：智慧之光】大門開啟，虹光獨角獸踏著彩虹現身。15位夥伴全體集結，聖殿內部的光芒直衝雲霄。獨角獸祝賀探險隊達成偉大成就，現在，你們已成為宇宙中真正的單字大師！"}
];

let state = { lv: 1, exp: 0, egg: 0, pets: [], mode: "", mastered: [] };
let curQ = null, revIdx = 0, revList = [];

function save() { localStorage.setItem("space_master_v6_0", JSON.stringify(state)); }
function load() { 
    const s = localStorage.getItem("space_master_v6_0");
    if(s) { state = JSON.parse(s); state.pets = state.pets.map(p => (typeof p === 'string' || p >= PETS.length) ? Math.floor(Math.random()*PETS.length) : p); }
}

function updateUI() {
    document.getElementById('lv').innerText = state.lv;
    document.getElementById('exp-val').innerText = state.exp;
    document.getElementById('exp-fill').style.width = (state.exp % 100) + "%";
    document.getElementById('egg-val').innerText = state.egg;
    const hint = document.getElementById('hatch-hint');
    if(state.mode === 'mcq') hint.innerText = "⚔️ 連擊挑戰：連續答對 10 題解鎖！ (答錯歸零)";
    else if(state.mode === 'spelling') hint.innerText = "🎧 累積挑戰：累積 10 題即可解鎖！";
}

function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
function toHome() { window.speechSynthesis.cancel(); showScreen('scr-menu'); }

function showStoryList() {
    showScreen('scr-story-list');
    const list = document.getElementById('story-list'); list.innerHTML = "";
    if (!state.pets.length) list.innerHTML = "<p style='padding:20px; color:#666; text-align:center;'>尚未解鎖故事，孵化夥伴來開啟冒險！</p>";
    else {
        [...new Set(state.pets)].sort((a,b)=>a-b).forEach(idx => {
            const p = PETS[idx]; const div = document.createElement('div'); div.className = 'pet-card'; div.style.cursor = "pointer";
            div.onclick = () => { document.getElementById('story-title').innerText = p.n + " 的航誌"; document.getElementById('story-content').innerText = p.story; showScreen('scr-story-read'); };
            div.innerHTML = `<div class="pet-img-box">${p.s}</div><div class="pet-info"><h4>${p.n} 的冒險</h4><p>點擊開啟冒險航誌...</p></div>`;
            list.appendChild(div);
        });
    }
}

function startReview() {
    let list = WORDS.filter(w => !state.mastered.includes(w.w)); if(list.length < 10) list = WORDS;
    revList = list.sort(() => 0.5 - Math.random()).slice(0, 10); revIdx = 0;
    showScreen('scr-review'); renderReview();
}
function renderReview() {
    const itm = revList[revIdx]; document.getElementById('rev-word').innerText = itm.w; document.getElementById('rev-meaning').innerText = itm.m;
    document.getElementById('rev-idx').innerText = revIdx + 1; speak(itm.w);
    document.getElementById('rev-btn').innerText = (revIdx === 9) ? "完成放送 (領取 50 EXP)" : "下一個 (Next)";
}
function nextReviewWord() { if(revIdx < 9) { revIdx++; renderReview(); } else { state.exp += 50; alert("✨ 放送完畢！"); toHome(); save(); updateUI(); } }

function startMode(m) { state.mode = m; state.egg = 0; showScreen('scr-game'); document.getElementById('mcq-box').style.display = m==='mcq'?'flex':'none'; document.getElementById('spell-box').style.display = m==='spelling'?'block':'none'; nextQ(); }

function showLibrary() {
    showScreen('scr-lib'); const list = document.getElementById('lib-list'); list.innerHTML = "";
    if(!state.pets.length) list.innerHTML = "<p style='padding:20px; color:#666;'>尚無夥伴。</p>";
    state.pets.forEach(idx => {
        const p = PETS[idx] || PETS[0]; const div = document.createElement('div'); div.className = 'pet-card';
        div.innerHTML = `<div class="pet-img-box">${p.s}</div><div class="pet-info"><h4>${p.n}</h4><p>${p.d}</p></div>`;
        list.appendChild(div);
    });
}

function nextQ() {
    curQ = WORDS[Math.floor(Math.random() * WORDS.length)];
    document.getElementById('display-q').innerText = state.mode === 'mcq' ? curQ.w : "❓❓❓";
    if(state.mode === 'mcq') renderMCQ();
    else { document.getElementById('spell-hint').innerText = curQ.m; document.getElementById('spell-in').value = ""; speak(curQ.w); setTimeout(()=>document.getElementById('spell-in').focus(), 300); }
    updateUI();
}

function renderMCQ() {
    let opts = [curQ.m]; while(opts.length < 4) { let r = WORDS[Math.floor(Math.random()*WORDS.length)].m; if(!opts.includes(r)) opts.push(r); }
    opts.sort(() => Math.random() - 0.5); const box = document.getElementById('mcq-box'); box.innerHTML = "";
    opts.forEach(o => { const b = document.createElement('button'); b.className = 'btn-opt'; b.innerText = o; b.onclick = () => check(o); box.appendChild(b); });
}

function speak(t) { window.speechSynthesis.cancel(); const m = new SpeechSynthesisUtterance(t); m.lang = 'en-US'; m.rate = 0.8; window.speechSynthesis.speak(m); }

function check(ans) {
    const isS = state.mode === 'spelling'; const correct = isS ? curQ.w.toLowerCase() : curQ.m;
    const input = isS ? document.getElementById('spell-in').value.toLowerCase().trim() : ans;

    if(input === correct) {
        state.exp += 30; state.egg++; if(!state.mastered.includes(curQ.w)) state.mastered.push(curQ.w);
        if(state.egg >= 10) { 
            const ridx = Math.floor(Math.random()*PETS.length); state.pets.push(ridx); state.egg = 0; 
            alert(`🐣 孵化成功！獲得夥伴：${PETS[ridx].n}\n冒險故事已解鎖新篇章！`); 
        }
    } else {
        if(state.mode === 'mcq') { state.egg = 0; alert("❌ 連擊中斷！能量歸零！\n答案是: " + curQ.m); }
        else alert("❌ 拼寫錯誤，答案是: " + curQ.w);
    }
    if(state.exp >= (state.lv * 100)) { state.lv++; alert("🆙 RANK UP! 等級提升！"); }
    save(); updateUI(); nextQ();
}

document.getElementById('spell-in').onkeydown = (e) => { if(e.key === 'Enter') check(); };
window.onload = () => { load(); updateUI(); };
</script>
</body>
</html>
