<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>太空單字探險家 v5.5 - 彩虹狗狗老師</title>
    <style>
        :root {
            --bg: #05050d; --neon: #00f2fe; --accent: #ff00de; --glass: rgba(20, 20, 45, 0.9);
        }
        body {
            margin: 0; background: var(--bg); color: white;
            font-family: 'Segoe UI', "Microsoft JhengHei", sans-serif;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
            background-image: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
        }
        #game-container {
            width: 90%; max-width: 440px; background: var(--glass);
            backdrop-filter: blur(15px); border-radius: 24px; padding: 20px;
            border: 1px solid rgba(0, 242, 254, 0.3); text-align: center; position: relative;
        }
        .header { margin-bottom: 15px; }
        .lv-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .lv-tag { background: linear-gradient(45deg, #ffd700, #ffa500); color: #000; padding: 3px 12px; border-radius: 50px; font-weight: bold; font-size: 0.8em; }
        .exp-bg { width: 100%; height: 10px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; border: 1px solid #333; }
        #exp-fill { height: 100%; background: var(--neon); width: 0%; transition: width 0.4s; }

        .screen { display: none; animation: fadeIn 0.3s; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .btn-mode {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            padding: 15px; border-radius: 12px; margin-bottom: 8px; cursor: pointer; transition: 0.3s; width: 100%; color: white;
        }
        .btn-mode:hover { border-color: var(--neon); background: rgba(0,242,254,0.15); transform: translateY(-2px); }
        .btn-mode h3 { margin: 0 0 3px 0; font-size: 1.05em; }
        .btn-mode p { margin: 0; font-size: 0.75em; color: #aaa; }

        .arena { height: 110px; display: flex; flex-direction: column; justify-content: center; align-items: center; margin-bottom: 10px; }
        #monster { font-size: 50px; animation: float 3s infinite ease-in-out; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        
        .btn-opt { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); padding: 12px; border-radius: 12px; cursor: pointer; margin-bottom: 8px; width: 100%; }
        .btn-opt:hover { background: var(--neon); color: #000; font-weight: bold; }
        
        #spell-in { width: 85%; padding: 12px; font-size: 1.5em; text-align: center; border-radius: 15px; border: 2px solid var(--neon); background: #000; color: var(--neon); outline: none; font-family: monospace; }

        .lib-list { display: flex; flex-direction: column; gap: 10px; max-height: 320px; overflow-y: auto; padding: 5px; text-align: left; }
        .pet-card { background: rgba(255, 255, 255, 0.08); border-radius: 15px; padding: 12px; border: 1px solid #444; display: flex; align-items: center; gap: 15px; }
        .pet-img-box { width: 45px; height: 45px; background: rgba(0,0,0,0.4); border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .pet-svg { width: 35px; height: 35px; image-rendering: pixelated; }
        .pet-info h4 { margin: 0; color: var(--neon); font-size: 0.95em; }
        .pet-info p { margin: 4px 0 0 0; font-size: 0.75em; color: #ccc; line-height: 1.4; }

        .back-btn { background: rgba(255,255,255,0.1); border: 1px solid #555; color: #fff; cursor: pointer; padding: 5px 12px; border-radius: 8px; font-size: 0.8em; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="game-container">
    <div class="header">
        <div class="lv-info">
            <span class="lv-tag">RANK LV <span id="lv">1</span></span>
            <span style="font-size: 0.8em; color: #888;">EXP: <span id="exp-val">0</span></span>
        </div>
        <div class="exp-bg"><div id="exp-fill"></div></div>
    </div>

    <div id="scr-menu" class="screen active">
        <h2 style="color:var(--neon); margin-bottom:15px; text-shadow:0 0 10px var(--neon);">🐾 太空單字探險家</h2>
        <button class="btn-mode" onclick="showStoryList()"><h3>🛰️ 故事模式</h3><p>解鎖星際冒險航誌</p></button>
        <button class="btn-mode" onclick="startReview()"><h3>📡 單字廣播</h3><p>觀看單字領取 50 EXP</p></button>
        <button class="btn-mode" onclick="startMode('mcq')"><h3>⚔️ 選擇題 (連擊挑戰)</h3><p>需連續答對 10 題孵化</p></button>
        <button class="btn-mode" onclick="startMode('spelling')"><h3>🎧 聽音拼字 (累積挑戰)</h3><p>累積答對 10 題孵化</p></button>
        <button class="btn-mode" onclick="showLibrary()"><h3>📖 夥伴圖鑑</h3><p>檢視 10 位日式點陣夥伴</p></button>
    </div>

    <div id="scr-game" class="screen">
        <div style="text-align:left;"><button class="back-btn" onclick="toHome()">🏠 返回</button></div>
        <div id="hatch-hint" style="color:var(--neon); font-size:0.9em; margin-bottom:5px;"></div>
        <div class="arena"><div id="monster">👾</div><h2 id="display-q"></h2></div>
        <div id="mcq-box" style="display:flex; flex-direction:column;"></div>
        <div id="spell-box" style="display:none;">

            <input type="text" id="spell-in" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" placeholder="請拼寫...">
        </div>
    </div>

    <div id="scr-story-list" class="screen">
        <div style="text-align:left;"><button class="back-btn" onclick="toHome()">🏠 返回</button></div>
        <h3 style="color:var(--accent);">解鎖的冒險故事</h3>
        <div id="story-list" class="lib-list"></div>
    </div>

    <div id="scr-story-read" class="screen">
        <div style="text-align:left;"><button class="back-btn" onclick="showStoryList()">⬅️ 返回</button></div>
        <h3 id="story-title" style="color:var(--neon);"></h3>
        <div id="story-content" style="background:rgba(0,0,0,0.5); padding:20px; border-radius:15px; border:1px solid var(--accent); line-height:1.6; text-align:left; font-size:0.9em;"></div>
    </div>

    <div id="scr-lib" class="screen">
        <div style="text-align:left;"><button class="back-btn" onclick="toHome()">🏠 返回</button></div>
        <div id="lib-list" class="lib-list"></div>
    </div>

    <div id="scr-review" class="screen">
        <div style="text-align:left;"><button class="back-btn" onclick="toHome()">🏠 返回</button></div>
        <p style="color:var(--neon);">放送中: <span id="rev-idx">1</span>/10</p>
        <div style="background:rgba(0,0,0,0.4); padding:20px; border-radius:15px; border:1px solid var(--neon); margin:10px 0;">
            <h1 id="rev-word" style="color:var(--neon); margin:0;">READY</h1>
            <p id="rev-meaning" style="margin-top:10px;">準備開始</p>
        </div>
        <button class="btn-opt" id="rev-btn" onclick="nextReviewWord()">下一個</button>
    </div>

    <div style="margin-top:15px; border-top:1px solid #333; padding-top:10px; font-size:0.8em; color:#888;">
        孵化進度: <span id="egg-val">0</span> / 10
    </div>
</div>

    {n: "機機器人", d: "內建 300 萬種單字庫，最強大的學習助教，性格冷靜可靠。", s: '<svg class="pet-svg" viewBox="0 0 10 10"><path d="M3 2h4v5H3zm2 5h2v-1H4z" fill="#888"/><rect x="4" y="3" width="2" height="1" fill="#00f2fe"/></svg>', story: "【冒險 0-5：代碼修復】你在殘骸中修復了機機器人。牠眼中亮起光束：『學習程序啟動，讓我們一起征服這片星系！』"},
    {n: "閃電雲朵", d: "電系精靈，跑得飛快，最喜歡在星系間玩捉迷藏。", s: '<svg class="pet-svg" viewBox="0 0 10 10"><path d="M2 4h6v2H2zM4 2h2v6H4z" fill="#ffff00"/><path d="M3 4h4v1H3z" fill="#000"/></svg>', story: "【冒險 0-6：閃電追逐】你發現這朵雲跑得比飛船還快！牠決定加入隊伍，為飛船提供永不枯竭的動力。"},
    {n: "幽靈泡泡", d: "透明系生物，擁有隱身能力，總是在背後默默守護大家。", s: '<svg class="pet-svg" viewBox="0 0 10 10"><path d="M3 2h4v6H3zm-1 3h6v3H2z" fill="#e0e0e0" opacity="0.6"/><circle cx="4" cy="4" r="0.5" fill="#000"/></svg>', story: "【冒險 0-7：隱形的守護】你感覺背後有人，回頭卻空無一物。直到泡泡顯現，牠說牠一直在幫你清除太空中的單字垃圾。"},
    {n: "萌翠種子", d: "草系夥伴，生命力極強。能將單字能量轉換為翠綠森林。", s: '<svg class="pet-svg" viewBox="0 0 10 10"><path d="M4 8h2V5H4zm-1-3h4v1H3zm2-3h1v2H5z" fill="#32cd32"/></svg>', story: "【冒險 0-8：綠色星球】種子落下的地方，荒蕪行星瞬間開滿鮮花。牠將和你一起把知識傳遍每個角落。"},
    {n: "冰晶企鵝", d: "冰系精靈，性格極度冷靜。最喜歡收集亮晶晶的星星碎片。", s: '<svg class="pet-svg" viewBox="0 0 10 10"><path d="M3 3h4v6H3z" fill="#1e90ff"/><path d="M4 4h1v1H4zm1 0h1v1H5z" fill="#fff"/></svg>', story: "【冒險 0-9：極低溫保存】企鵝用冰凍護盾擋住了流星雨。牠淡淡地說：『冷靜面對單字，就像面對寒冬一樣自然。』"},
    {n: "金屬巨蟹", d: "防禦系王者，性格沉穩。巨大的雙螯守護著探險隊的秘密。", s: '<svg class="pet-svg" viewBox="0 0 10 10"><path d="M2 5h6v3H2zM1 4h2v1H1zm6 0h2v1H7z" fill="#ff4500"/></svg>', story: "【冒險 0-10：鋼鐵守衛】巨蟹擋在黑洞前，雙螯一夾便碎開了空間壓力。牠承諾會是你背單字時最堅強的護盾。"}
];

let state = { lv: 1, exp: 0, egg: 0, pets: [], mode: "", mastered: [] };
let curQ = null, revIdx = 0, revList = [];

function save() { localStorage.setItem("space_master_v5_5", JSON.stringify(state)); }
function load() { 
    const s = localStorage.getItem("space_master_v5_5");
    if(s) {
        state = JSON.parse(s);
        state.pets = state.pets.map(p => (typeof p === 'string') ? Math.floor(Math.random()*PETS.length) : p);
    }
}

function updateUI() {
    document.getElementById('lv').innerText = state.lv;
    document.getElementById('exp-val').innerText = state.exp;
    document.getElementById('exp-fill').style.width = (state.exp % 100) + "%";
    document.getElementById('egg-val').innerText = state.egg;
    const hint = document.getElementById('hatch-hint');
    if(state.mode === 'mcq') hint.innerText = "⭐ 選擇題：需連續答對 10 題孵化 (COMBO)";
    else if(state.mode === 'spelling') hint.innerText = "🎧 拼字題：累積答對 10 題即可孵化";
}

function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
function toHome() { window.speechSynthesis.cancel(); showScreen('scr-menu'); }

function showStoryList() {
    showScreen('scr-story-list');
    const list = document.getElementById('story-list'); list.innerHTML = "";
    if (!state.pets.length) list.innerHTML = "<p style='padding:20px; color:#666; text-align:center;'>尚未解鎖故事。</p>";
    else {
        [...new Set(state.pets)].forEach(idx => {
            const p = PETS[idx];
            const div = document.createElement('div'); div.className = 'pet-card'; div.style.cursor = "pointer";
            div.onclick = () => { document.getElementById('story-title').innerText = p.n; document.getElementById('story-content').innerText = p.story; showScreen('scr-story-read'); };
            div.innerHTML = `<div class="pet-img-box">${p.s}</div><div class="pet-info"><h4>${p.n} 的航誌</h4><p>點擊閱讀冒險故事...</p></div>`;
            list.appendChild(div);
        });
    }
}

function startReview() {
    let list = WORDS.filter(w => !state.mastered.includes(w.w)); if(list.length < 10) list = WORDS;
    revList = list.sort(() => 0.5 - Math.random()).slice(0, 10); revIdx = 0;
    showScreen('scr-review'); renderReview();
}
function renderReview() {
    const itm = revList[revIdx]; document.getElementById('rev-idx').innerText = revIdx + 1;
    document.getElementById('rev-word').innerText = itm.w; document.getElementById('rev-meaning').innerText = itm.m;
    speak(itm.w); document.getElementById('rev-btn').innerText = (revIdx === 9) ? "領取 50 EXP" : "下一個";
}
function nextReviewWord() { if(revIdx < 9) { revIdx++; renderReview(); } else { state.exp += 50; alert("✨ 廣播結束！"); toHome(); save(); updateUI(); } }

function startMode(m) { state.mode = m; state.egg = 0; showScreen('scr-game'); document.getElementById('mcq-box').style.display = m==='mcq'?'flex':'none'; document.getElementById('spell-box').style.display = m==='spelling'?'block':'none'; nextQ(); }

function showLibrary() {
    showScreen('scr-lib'); const list = document.getElementById('lib-list'); list.innerHTML = "";
    state.pets.forEach(idx => {
        const p = PETS[idx] || PETS[0];
        const div = document.createElement('div'); div.className = 'pet-card';
        div.innerHTML = `<div class="pet-img-box">${p.s}</div><div class="pet-info"><h4>${p.n}</h4><p>${p.d}</p></div>`;
        list.appendChild(div);
    });
}

function nextQ() {
    curQ = WORDS[Math.floor(Math.random() * WORDS.length)];
    document.getElementById('display-q').innerText = state.mode === 'mcq' ? curQ.w : "❓❓❓";
    if(state.mode === 'mcq') renderMCQ();
    else { document.getElementById('spell-hint').innerText = curQ.m; document.getElementById('spell-in').value = ""; speak(curQ.w); setTimeout(()=>document.getElementById('spell-in').focus(), 300); }
    updateUI();
}

function renderMCQ() {
    let opts = [curQ.m]; while(opts.length < 4) { let r = WORDS[Math.floor(Math.random()*WORDS.length)].m; if(!opts.includes(r)) opts.push(r); }
    opts.sort(() => Math.random() - 0.5); const box = document.getElementById('mcq-box'); box.innerHTML = "";
    opts.forEach(o => { const b = document.createElement('button'); b.className = 'btn-opt'; b.innerText = o; b.onclick = () => check(o); box.appendChild(b); });
}

function speak(t) { window.speechSynthesis.cancel(); const m = new SpeechSynthesisUtterance(t); m.lang = 'en-US'; window.speechSynthesis.speak(m); }

function check(ans) {
    const isS = state.mode === 'spelling';
    const correct = isS ? curQ.w.toLowerCase() : curQ.m;
    const input = isS ? document.getElementById('spell-in').value.toLowerCase().trim() : ans;

    if(input === correct) {
        state.exp += 30; state.egg++;
        if(!state.mastered.includes(curQ.w)) state.mastered.push(curQ.w);
        if(state.egg >= 10) { 
            const ridx = Math.floor(Math.random()*PETS.length);
            state.pets.push(ridx); state.egg = 0; alert(`🐣 孵化成功！${PETS[ridx].n} 加入隊伍！`); 
        }
    } else {
        if(state.mode === 'mcq') { state.egg = 0; alert("❌ 連擊中斷！進度歸零！\n正確答案是: " + curQ.m); }
        else alert("❌ 累積不中斷，但這題錯了。\n正確拼寫: " + curQ.w);
    }
    if(state.exp >= (state.lv * 100)) { state.lv++; alert("🆙 等級提升！"); }
    save(); updateUI(); nextQ();
}

document.getElementById('spell-in').onkeydown = (e) => { if(e.key === 'Enter') check(); };
window.onload = () => { load(); updateUI(); };
</script>
