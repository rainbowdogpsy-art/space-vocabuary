<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>太空單字探險家 v3.2 - 彩虹狗狗老師</title>
    <style>
        :root {
            --bg: #05050d; --neon: #00f2fe; --accent: #ff00de; --glass: rgba(18, 18, 40, 0.9);
        }
        body {
            margin: 0; background: var(--bg); color: white;
            font-family: 'Segoe UI', "Microsoft JhengHei", sans-serif;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
            background-image: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
        }
        #game-container {
            width: 90%; max-width: 440px; background: var(--glass);
            backdrop-filter: blur(15px); border-radius: 24px; padding: 25px;
            border: 1px solid rgba(0, 242, 254, 0.3); text-align: center; position: relative;
            box-shadow: 0 0 30px rgba(0,0,0,0.6);
        }
        /* 狀態列 */
        .header { display: flex; align-items: center; gap: 12px; margin-bottom: 25px; }
        .lv-tag { background: linear-gradient(45deg, #ffd700, #ffa500); color: #000; padding: 4px 14px; border-radius: 50px; font-weight: bold; font-size: 0.85em; box-shadow: 0 0 10px rgba(255,215,0,0.4); }
        .exp-bg { flex-grow: 1; height: 12px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; border: 1px solid #333; }
        #exp-fill { height: 100%; background: var(--neon); width: 0%; transition: width 0.5s cubic-bezier(0.17, 0.67, 0.83, 0.67); box-shadow: 0 0 10px var(--neon); }

        .screen { display: none; animation: fadeIn 0.4s; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .menu-title { font-size: 2.2em; color: var(--neon); margin-bottom: 25px; text-shadow: 0 0 15px var(--neon); letter-spacing: 2px; }
        .btn-mode {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.15);
            padding: 22px; border-radius: 18px; margin-bottom: 15px; cursor: pointer; transition: 0.3s; width: 100%; color: white; text-align: left;
        }
        .btn-mode:hover { border-color: var(--neon); background: rgba(0,242,254,0.15); transform: scale(1.03); }
        .btn-mode h3 { margin: 0 0 5px 0; color: #fff; }
        .btn-mode p { margin: 0; font-size: 0.85em; color: #aaa; }

        /* 戰鬥區 */
        .arena { height: 160px; display: flex; flex-direction: column; justify-content: center; align-items: center; margin-bottom: 15px; }
        #monster { font-size: 70px; animation: float 3s infinite ease-in-out; filter: drop-shadow(0 0 10px rgba(255,255,255,0.3)); }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        
        .opt-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
        .btn-opt { background: rgba(255,255,255,0.08); color: white; border: 1px solid rgba(255,255,255,0.2); padding: 15px; border-radius: 14px; cursor: pointer; font-size: 1.1em; transition: 0.2s; }
        .btn-opt:hover { background: var(--neon); color: #000; font-weight: bold; box-shadow: 0 0 15px var(--neon); }
        
        #spell-in { width: 90%; padding: 15px; font-size: 1.6em; text-align: center; border-radius: 15px; border: 2px solid var(--neon); background: #000; color: var(--neon); outline: none; box-shadow: 0 0 10px rgba(0,242,254,0.2); }

        /* 圖鑑區 */
        .lib-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; max-height: 240px; overflow-y: auto; padding: 15px; background: rgba(0,0,0,0.2); border-radius: 15px; }
        .pet-card { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 8px; border: 1px solid #444; transition: 0.3s; }
        .pet-card:hover { transform: translateY(-5px); border-color: var(--accent); background: rgba(255,0,222,0.1); }
        .pet-img { width: 100%; height: auto; image-rendering: pixelated; }
        
        .back-btn { position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.6); border: 1px solid #555; color: #fff; cursor: pointer; padding: 5px 12px; border-radius: 8px; font-size: 0.8em; z-index: 100; }
        .footer-info { margin-top:20px; border-top:1px solid rgba(255,255,255,0.1); padding-top:15px; font-size:0.85em; color:#888; }
    </style>
</head>
<body>

<div id="game-container">
    <div class="header">
        <span class="lv-tag">RANK <span id="lv">1</span></span>
        <div class="exp-bg"><div id="exp-fill"></div></div>
    </div>

    <div id="scr-menu" class="screen active">
        <div class="menu-title">🐾 太空單字探險家</div>
        <div class="btn-mode" onclick="startMode('mcq')"><h3>⚔️ 意義選擇戰鬥</h3><p>觀察英文代碼，切換正確中文頻道</p></div>
        <div class="btn-mode" onclick="startMode('spelling')"><h3>🎧 聽力拼字大戰</h3><p>接收星際語音，輸入正確英文代碼</p></div>
        <div class="btn-mode" onclick="showLibrary()"><h3>📖 星際夥伴圖鑑</h3><p>檢視已孵化的日式點陣小隊</p></div>
    </div>

    <div id="scr-game" class="screen">
        <button class="back-btn" onclick="toHome()">🏠 退出</button>
        <div class="arena">
            <div id="monster">👾</div>
            <h2 id="display-q" style="margin: 0; font-size: 2.4em; text-shadow: 0 0 10px var(--neon);"></h2>
        </div>
        <div id="mcq-box" class="opt-grid"></div>
        <div id="spell-box" style="display:none;">
            <p id="spell-hint" style="color:var(--accent); font-size: 1.3em; margin: 10px 0; font-weight:bold;"></p>
            <input type="text" id="spell-in" placeholder="輸入單字..." autocomplete="off">
            <button onclick="speak(curQ.w)" style="margin-top:15px; background:none; border:1px solid #555; color:#aaa; cursor:pointer; padding:6px 12px; border-radius:5px;">🔊 重聽發音 (或按R鍵)</button>
        </div>
    </div>

    <div id="scr-lib" class="screen">
        <button class="back-btn" onclick="toHome()">🏠 返回</button>
        <h3 style="color:var(--neon); margin: 10px 0;">我的夥伴圖鑑</h3>
        <div id="lib-list" class="lib-grid"></div>
        <div id="lib-stats" style="margin-top:15px; font-size:0.9em; color:var(--neon);"></div>
    </div>

    <div class="footer-info">
        孵化能量 (<span id="egg-val">0</span>/10) <span id="egg-icons"></span>
    </div>
</div>

// --- 遊戲邏輯 ---
let state = { lv: 1, exp: 0, egg: 0, pets: [], mode: "", mastered: 0 };
let curQ = null;

function save() { localStorage.setItem("space_master_v3", JSON.stringify(state)); }
function load() { 
    const s = localStorage.getItem("space_master_v3");
    if(s) state = JSON.parse(s);
}

function updateUI() {
    document.getElementById('lv').innerText = state.lv;
    document.getElementById('exp-fill').style.width = (state.exp % 100) + "%";
    document.getElementById('egg-val').innerText = state.egg;
}

function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

function startMode(m) {
    state.mode = m; showScreen('scr-game');
    document.getElementById('mcq-box').style.display = m === 'mcq' ? 'grid' : 'none';
    document.getElementById('spell-box').style.display = m === 'spelling' ? 'block' : 'none';
    nextQ();
}

function toHome() { window.speechSynthesis.cancel(); showScreen('scr-menu'); }

function showLibrary() {
    showScreen('scr-lib');
    const list = document.getElementById('lib-list');
    list.innerHTML = state.pets.length ? "" : "<p style='grid-column:span 4; color:#666;'>尚無夥伴，去挑戰吧！</p>";
    state.pets.forEach(src => {
        const div = document.createElement('div'); div.className = 'pet-card';
        const img = document.createElement('img'); img.src = src; img.className = 'pet-img';
        div.appendChild(img); list.appendChild(div);
    });
    document.getElementById('lib-stats').innerHTML = `探險總經驗: ${state.exp} EXP<br>已解鎖夥伴: ${state.pets.length} 位<br>掌握單字量: ${state.mastered}`;
}

function nextQ() {
    curQ = WORDS[Math.floor(Math.random() * WORDS.length)];
    document.getElementById('display-q').innerText = state.mode === 'mcq' ? curQ.w : "❓❓❓";
    if(state.mode === 'mcq') renderMCQ();
    else {
        document.getElementById('spell-hint').innerText = curQ.m;
        document.getElementById('spell-in').value = "";
        speak(curQ.w);
        setTimeout(() => document.getElementById('spell-in').focus(), 300);
    }
}

function renderMCQ() {
    let opts = [curQ.m];
    while(opts.length < 4) {
        let r = WORDS[Math.floor(Math.random()*WORDS.length)].m;
        if(!opts.includes(r)) opts.push(r);
    }
    opts.sort(() => Math.random() - 0.5);
    const box = document.getElementById('mcq-box'); box.innerHTML = "";
    opts.forEach(o => {
        const b = document.createElement('button'); b.className = 'btn-opt'; b.innerText = o; b.onclick = () => check(o); box.appendChild(b);
    });
}

function speak(t) {
    window.speechSynthesis.cancel();
    const m = new SpeechSynthesisUtterance(t); m.lang = 'en-US'; m.rate = 0.8;
    window.speechSynthesis.speak(m);
}

function check(ans) {
    const isS = state.mode === 'spelling';
    const correct = isS ? curQ.w.toLowerCase() : curQ.m;
    const input = isS ? document.getElementById('spell-in').value.toLowerCase().trim() : ans;

    if(input === correct) {
        state.exp += 35; state.egg++; state.mastered++;
        if(state.egg >= 10) { 
            const newPet = PETS_SVG[Math.floor(Math.random()*PETS_SVG.length)];
            state.pets.push(newPet); state.egg = 0;
            alert("🐣 探測到新生命！一名夥伴加入了你的圖鑑！"); 
        }
        if(state.exp >= (state.lv * 100)) { state.lv++; alert("🆙 太強了！探險等級提升至 LV " + state.lv); }
        nextQ();
    } else {
        alert("代碼錯誤！正確答案是: " + (isS ? curQ.w : curQ.m));
        nextQ();
    }
    save(); updateUI();
}

document.getElementById('spell-in').onkeydown = (e) => { if(e.key === 'Enter') check(); };
window.onkeydown = (e) => { if(e.key.toLowerCase() === 'r' && state.mode === 'spelling') speak(curQ.w); };
window.onload = () => { load(); updateUI(); };
</script>
</body>
