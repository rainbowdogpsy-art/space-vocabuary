<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>太空單字探險家 v4.2 - 彩虹狗狗老師</title>
    <style>
        :root {
            --bg: #05050d; --neon: #00f2fe; --accent: #ff00de; --glass: rgba(20, 20, 45, 0.9);
        }
        body {
            margin: 0; background: var(--bg); color: white;
            font-family: 'Segoe UI', "Microsoft JhengHei", sans-serif;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
            background-image: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
        }
        #game-container {
            width: 90%; max-width: 440px; background: var(--glass);
            backdrop-filter: blur(15px); border-radius: 24px; padding: 25px;
            border: 1px solid rgba(0, 242, 254, 0.3); text-align: center; position: relative;
        }
        .header { margin-bottom: 20px; }
        .lv-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .lv-tag { background: linear-gradient(45deg, #ffd700, #ffa500); color: #000; padding: 3px 12px; border-radius: 50px; font-weight: bold; font-size: 0.8em; }
        .exp-bg { width: 100%; height: 10px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; border: 1px solid #333; }
        #exp-fill { height: 100%; background: var(--neon); width: 0%; transition: width 0.4s; box-shadow: 0 0 10px var(--neon); }

        .screen { display: none; animation: fadeIn 0.3s; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .btn-mode {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            padding: 18px; border-radius: 15px; margin-bottom: 12px; cursor: pointer; transition: 0.3s; width: 100%; color: white;
        }
        .btn-mode:hover { border-color: var(--neon); background: rgba(0,242,254,0.1); }

        .arena { height: 120px; display: flex; flex-direction: column; justify-content: center; align-items: center; margin-bottom: 10px; }
        #monster { font-size: 60px; animation: float 3s infinite ease-in-out; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        
        .btn-opt { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); padding: 14px; border-radius: 12px; cursor: pointer; font-size: 1.1em; margin-bottom: 10px; width: 100%; }
        .btn-opt:hover { background: var(--neon); color: black; font-weight: bold; }
        
        #spell-in { 
            width: 85%; padding: 15px; font-size: 1.6em; text-align: center; border-radius: 15px; 
            border: 2px solid var(--neon); background: #000; color: var(--neon); outline: none; font-family: monospace;
        }

        /* 圖鑑清單排版 */
        .lib-list { display: flex; flex-direction: column; gap: 12px; max-height: 280px; overflow-y: auto; padding: 5px; text-align: left; }
        .pet-card { 
            background: rgba(255,255,255,0.08); border-radius: 15px; padding: 15px; 
            border: 1px solid #444; display: flex; align-items: center; gap: 15px;
        }
        .pet-img-box { width: 50px; height: 50px; background: rgba(0,0,0,0.4); border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .pet-svg { width: 42px; height: 42px; image-rendering: pixelated; }
        .pet-info { flex-grow: 1; }
        .pet-info h4 { margin: 0; color: var(--neon); font-size: 1em; letter-spacing: 1px; }
        .pet-info p { margin: 4px 0 0 0; font-size: 0.75em; color: #ccc; line-height: 1.4; }
        
        .nav-bar { display: flex; justify-content: flex-start; margin-bottom: 15px; }
        .back-btn { background: rgba(255,255,255,0.1); border: 1px solid #555; color: #fff; cursor: pointer; padding: 6px 15px; border-radius: 8px; font-size: 0.85em; }
    </style>
</head>
<body>

<div id="game-container">
    <div class="header">
        <div class="lv-info">
            <span class="lv-tag">RANK LV <span id="lv">1</span></span>
            <span style="font-size: 0.8em; color: #888;">EXP: <span id="exp-val">0</span></span>
        </div>
        <div class="exp-bg"><div id="exp-fill"></div></div>
    </div>

    <div id="scr-menu" class="screen active">
        <h2 style="color:var(--neon); margin-bottom:20px; text-shadow:0 0 10px var(--neon);">🐾 太空單字探險家</h2>
        <button class="btn-mode" onclick="startMode('mcq')"><h3>⚔️ 意義選擇戰鬥</h3><p>累積答對 10 題獲得能量</p></button>
        <button class="btn-mode" onclick="startMode('spelling')"><h3>🎧 聽力拼字大戰</h3><p>反選字練習 (手動輸入代碼)</p></button>
        <button class="btn-mode" onclick="showLibrary()"><h3>📖 星際夥伴圖鑑</h3><p>查看夥伴名稱與性格小故事</p></button>
    </div>

    <div id="scr-game" class="screen">
        <div class="nav-bar"><button class="back-btn" onclick="toHome()">🏠 返回主選單</button></div>
        <div class="arena"><div id="monster">👾</div><h2 id="display-q"></h2></div>
        <div id="mcq-box" style="display:flex; flex-direction:column;"></div>
        <div id="spell-box" style="display:none;">
            <p id="spell-hint" style="color:var(--accent); font-weight:bold;"></p>
            <input type="text" id="spell-in" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" placeholder="請拼寫...">
        </div>
    </div>

    <div id="scr-lib" class="screen">
        <div class="nav-bar"><button class="back-btn" onclick="toHome()">🏠 返回主選單</button></div>
        <h3 style="color:var(--neon);">已解鎖夥伴圖鑑</h3>
        <div id="lib-list" class="lib-list"></div>
        <div id="lib-stats" style="margin-top:15px; font-size:0.8em; color:var(--neon); border-top:1px solid #333; padding-top:10px;"></div>
    </div>

    <div style="margin-top:20px; border-top:1px solid #333; padding-top:10px; font-size:0.8em; color:#888;">
        夥伴孵化能量: <span id="egg-val">0</span> / 10
    </div>
</div>

let state = { lv: 1, exp: 0, egg: 0, pets: [], mode: "", mastered: [] };
let curQ = null;

function save() { localStorage.setItem("space_master_v4_2", JSON.stringify(state)); }
function load() { 
    const s = localStorage.getItem("space_master_v4_2");
    if(s) {
        state = JSON.parse(s);
        // 修復舊存檔資料格式
        state.pets = state.pets.map(p => (typeof p === 'string' || p >= PETS.length) ? Math.floor(Math.random()*PETS.length) : p);
    }
}

function updateUI() {
    document.getElementById('lv').innerText = state.lv;
    document.getElementById('exp-val').innerText = state.exp;
    document.getElementById('exp-fill').style.width = (state.exp % 100) + "%";
    document.getElementById('egg-val').innerText = state.egg;
}

function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

function startMode(m) {
    state.mode = m; showScreen('scr-game');
    document.getElementById('mcq-box').style.display = m === 'mcq' ? 'flex' : 'none';
    document.getElementById('spell-box').style.display = m === 'spelling' ? 'block' : 'none';
    nextQ();
}

// --- 修正後的圖鑑顯示邏輯 ---
function showLibrary() {
    showScreen('scr-lib');
    const list = document.getElementById('lib-list');
    list.innerHTML = "";
    
    if (state.pets.length === 0) {
        list.innerHTML = "<p style='padding:20px; color:#666; width:100%; text-align:center;'>尚未獲得夥伴，答對題目來累積能量吧！</p>";
    } else {
        state.pets.forEach(idx => {
            const p = PETS[idx] || PETS[0];
            const div = document.createElement('div');
            div.className = 'pet-card';
            div.innerHTML = `
                <div class="pet-img-box">${p.s}</div>
                <div class="pet-info">
                    <h4>${p.n}</h4>
                    <p>${p.d}</p>
                </div>
            `;
            list.appendChild(div);
        });
    }
    document.getElementById('lib-stats').innerHTML = `單字大師進度: ${state.mastered.length} / ${WORDS.length} | 探險等級: LV ${state.lv}`;
}

function toHome() { window.speechSynthesis.cancel(); showScreen('scr-menu'); }

function nextQ() {
    curQ = WORDS[Math.floor(Math.random() * WORDS.length)];
    document.getElementById('display-q').innerText = state.mode === 'mcq' ? curQ.w : "❓❓❓";
    if(state.mode === 'mcq') renderMCQ();
    else {
        document.getElementById('spell-hint').innerText = curQ.m;
        document.getElementById('spell-in').value = "";
        speak(curQ.w); setTimeout(()=>document.getElementById('spell-in').focus(), 300);
    }
}

function renderMCQ() {
    let opts = [curQ.m];
    while(opts.length < 4) {
        let r = WORDS[Math.floor(Math.random()*WORDS.length)].m;
        if(!opts.includes(r)) opts.push(r);
    }
    opts.sort(() => Math.random() - 0.5);
    const box = document.getElementById('mcq-box'); box.innerHTML = "";
    opts.forEach(o => {
        const b = document.createElement('button'); b.className = 'btn-opt'; b.innerText = o; b.onclick = () => check(o); box.appendChild(b);
    });
}

function speak(t) {
    window.speechSynthesis.cancel();
    const m = new SpeechSynthesisUtterance(t); m.lang = 'en-US'; m.rate = 0.8;
    window.speechSynthesis.speak(m);
}

function check(ans) {
    const isS = state.mode === 'spelling';
    const correct = isS ? curQ.w.toLowerCase() : curQ.m;
    const input = isS ? document.getElementById('spell-in').value.toLowerCase().trim() : ans;

    if(input === correct) {
        state.exp += 30; state.egg++;
        if(!state.mastered.includes(curQ.w)) state.mastered.push(curQ.w);
        // 累積 10 題孵化機制
        if(state.egg >= 10) { 
            const ridx = Math.floor(Math.random()*PETS.length);
            state.pets.push(ridx); state.egg = 0;
            alert(`🐣 孵化成功！新夥伴：${PETS[ridx].n} 加入隊伍！`); 
        }
        if(state.exp >= (state.lv * 100)) { state.lv++; alert("🆙 等級提升！ RANK LV " + state.lv); }
        nextQ();
    } else {
        alert("代碼錯誤！正確答案是: " + (isS ? curQ.w : curQ.m));
        nextQ();
    }
    save(); updateUI();
}

document.getElementById('spell-in').onkeydown = (e) => { if(e.key === 'Enter') check(); };
window.onload = () => { load(); updateUI(); };
</script>
</body>
</html>
