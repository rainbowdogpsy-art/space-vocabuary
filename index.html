<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>太空單字探險家 v2.1 - 點陣夥伴計畫</title>
    <style>
        /* --- 核心定義與變數 (保留賽博龐克太空風) --- */
        :root {
            --bg-color: #050509;
            --panel-bg: rgba(15, 15, 30, 0.7);
            --primary-neon: #00f2fe;
            --secondary-neon: #4facfe;
            --accent-neon: #ff00de;
            --success-color: #39ff14;
            --error-color: #ff3131;
            --text-color: #ffffff;
            --gold-color: #ffd700;
            --font-main: 'Segoe UI', Roboto, Helvetica, Arial, "Microsoft JhengHei", sans-serif;
            --font-pixel: 'Courier New', Courier, monospace;
        }

        /* --- 太空星空背景 --- */
        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 3px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 2px);
            background-size: 550px 550px, 350px 350px;
            animation: starMove 100s linear infinite;
            color: var(--text-color);
            font-family: var(--font-main);
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
        }

        @keyframes starMove {
            from { background-position: 0 0, 40px 60px; }
            to { background-position: -550px 1100px, -350px 700px; }
        }

        /* --- 主容器 --- */
        #game-container {
            width: 90%; max-width: 500px;
            background: var(--panel-bg);
            backdrop-filter: blur(15px);
            border-radius: 20px; padding: 30px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255, 255, 255, 0.08);
            text-align: center;
            position: relative;
        }

        /* --- 狀態列優化 --- */
        .status-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 25px; padding-bottom: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .level-badge {
            background: linear-gradient(135deg, var(--gold-color), #b8860b);
            color: #000; padding: 5px 15px; border-radius: 50px;
            font-weight: bold; font-size: 0.9em;
        }
        .exp-container { display: flex; align-items: center; flex-grow: 1; margin: 0 15px; }
        .exp-bar-container {
            flex-grow: 1; height: 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }
        #exp-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--secondary-neon), var(--primary-neon));
            width: 0%; transition: width 0.4s ease-out;
            box-shadow: 0 0 10px var(--primary-neon);
        }
        .exp-text { font-size: 0.8em; color: rgba(255,255,255,0.7); width: 60px; text-align: right;}

        /* --- 主選單畫面 --- */
        .menu-title { font-size: 2em; margin-bottom: 35px; color: var(--primary-neon); text-shadow: 0 0 10px var(--primary-neon); }
        .mode-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            padding: 25px; border-radius: 15px; margin-bottom: 20px;
            cursor: pointer; transition: all 0.3s ease;
        }
        .mode-card:hover {
            background: rgba(0, 242, 254, 0.1);
            border-color: var(--primary-neon);
            transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(0, 242, 254, 0.3);
        }
        .mode-card h3 { margin: 0 0 8px 0; color: var(--text-color); }
        .mode-card p { margin: 0; font-size: 0.9em; color: rgba(255,255,255,0.6); }

        /* --- 遊戲主畫面 --- */
        #game-screen { display: none; }
        .battle-arena {
            height: 180px; display: flex; flex-direction: column;
            justify-content: center; align-items: center; margin-bottom: 25px;
        }
        #monster-sprite {
            font-size: 70px; margin-bottom: 10px;
            animation: monsterFloat 3s infinite ease-in-out;
        }
        @keyframes monsterFloat {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-10px) scale(1.03); }
        }
        #current-display {
            font-size: 2.5em; margin: 0; min-height: 1.2em;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
            font-weight: 700;
        }
        
        /* 選擇題霓虹按鈕 */
        #options-container { display: flex; flex-direction: column; gap: 12px; }
        .option-btn {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-color);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px; font-size: 1.1em; border-radius: 12px;
            cursor: pointer; transition: all 0.2s;
        }
        .option-btn:hover { background: rgba(79, 172, 254, 0.15); border-color: var(--secondary-neon); }

        /* 拼字題優化 */
        #spelling-container { display: none; flex-direction: column; align-items: center; gap: 18px; }
        #spell-input {
            width: 85%; padding: 15px; font-size: 1.8em; text-align: center;
            border-radius: 12px; border: 2px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.3); color: var(--text-color);
            font-family: var(--font-pixel); letter-spacing: 2px;
        }
        .hint-text { font-size: 1.1em; color: var(--accent-neon); margin: 0; font-weight: bold; }

        /* --- 【新增】底部點陣收集面板視覺 --- */
        #collection-panel {
            margin-top: 30px; border-top: 1px solid rgba(255,255,255,0.08);
            padding-top: 20px; font-size: 0.9em; color: rgba(255,255,255,0.5);
        }
        .egg-bar-container {
            width: 100%; height: 6px; background: rgba(255,255,255,0.05);
            border-radius: 10px; margin: 8px 0; overflow: hidden;
        }
        #egg-bar-fill {
            height: 100%; background: var(--accent-neon); width: 0%;
            transition: width 0.3s ease; box-shadow: 0 0 8px var(--accent-neon);
        }
        
        /* 夥伴點陣圖樣式 */
        .pet-sprite {
            width: 48px; height: 48px; 
            image-rendering: pixelated; /* 關鍵：強制開啟點陣縮放優化 */
            margin: 5px; 
            border-radius: 8px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 3px;
            transition: transform 0.2s;
        }
        .pet-sprite:hover { transform: scale(1.1) rotate(5deg); background: rgba(255,255,255,0.08); }
        
        #pet-list { 
            display: flex; justify-content: center; flex-wrap: wrap; 
            margin-top: 10px; min-height: 56px; gap: 5px;
        }
        .empty-pet { color: rgba(255,255,255,0.3); font-style: italic; margin-top: 15px;}
        
        .back-btn {
            position: absolute; top: 15px; left: 15px;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.6); border-radius: 8px; cursor: pointer; padding: 5px 12px;
        }

    </style>
</head>

};

// --- 遊戲邏輯與存檔 (保留老師原本的代碼) ---
const STORAGE_KEY = "rainbowDogSpaceVocab_v2.1";

let gameState = {
    lv: 1,
    exp: 0,
    expNeed: 100,
    eggProgress: 0,
    myPets: [], // 這裡現在儲存的是寵物的 ID（字串）
    currentMode: "", 
};

function saveState() {
    try {
        if (typeof(Storage) !== "undefined") {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(gameState));
        }
    } catch (e) {
        console.warn("無法保存進度：瀏覽器安全性限制。");
    }
}

function loadState() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
        try {
            gameState = JSON.parse(saved);
            return true;
        } catch (e) {
            console.error("讀檔失敗，初始化存檔。", e);
        }
    }
    return false;
}

let currentQ = null;

// --- 【修改】UI 更新核心：加入點陣圖片渲染 ---
function updateUI() {
    document.getElementById('lv').innerText = gameState.lv;
    document.getElementById('exp-txt').innerText = gameState.exp;
    document.getElementById('exp-need').innerText = gameState.expNeed;
    
    // 經驗條
    const pct = (gameState.exp / gameState.expNeed * 100);
    document.getElementById('exp-bar-fill').style.width = pct + "%";
    
    // 夥伴進度
    document.getElementById('egg-progress-txt').innerText = gameState.eggProgress;
    const eggPct = (gameState.eggProgress / 10 * 100);
    document.getElementById('egg-bar-fill').style.width = eggPct + "%";
    
    // 【關鍵修改】夥伴列表：從純文字改為渲染圖片
    const petListEl = document.getElementById('pet-list');
    petListEl.innerHTML = ""; // 清空舊內容
    
    if (gameState.myPets.length > 0) {
        // 遍歷已收集的寵物ID，建立圖片元素
        gameState.myPets.forEach(petId => {
            const base64Data = PET_LIBRARY[petId]; // 從資源池抓圖片代碼
            if(base64Data) {
                const img = document.createElement('img');
                img.src = base64Data;
                img.className = 'pet-sprite';
                img.alt = petId; // 用 ID 當代碼描述
                petListEl.appendChild(img);
            }
        });
    } else {
        petListEl.innerHTML = "<div class='empty-pet'>📡 掃描夥伴中... 答對10題孵化</div>";
    }
}

function startMode(mode) {
    gameState.currentMode = mode;
    saveState();
    document.getElementById('menu-screen').style.display = 'none';
    document.getElementById('game-screen').style.display = 'block';
    nextQ();
}

function goHome() {
    window.speechSynthesis.cancel();
    gameState.currentMode = "";
    saveState();
    document.getElementById('menu-screen').style.display = 'block';
    document.getElementById('game-screen').style.display = 'none';
}

function nextQ() {
    currentQ = ALL_WORDS[Math.floor(Math.random() * ALL_WORDS.length)];
    if(gameState.currentMode === 'mcq') {
        document.getElementById('current-display').innerText = currentQ.word;
        renderMCQ(currentQ);
    } else {
        document.getElementById('current-display').innerText = "❓❓❓";
        document.getElementById('spell-hint').innerText = currentQ.meaning;
        document.getElementById('spell-input').value = "";
        playCurrentWord();
        document.getElementById('spell-input').focus();
    }
}

function renderMCQ(q) {
    let opts = [q.meaning];
    while(opts.length < 3) {
        let f = ALL_WORDS[Math.floor(Math.random()*ALL_WORDS.length)].meaning;
        if(!opts.includes(f)) opts.push(f);
    }
    opts.sort(() => Math.random() - 0.5);

    const container = document.getElementById('options-container');
    container.innerHTML = "";
    opts.forEach(o => {
        const b = document.createElement('button');
        b.className = 'option-btn';
        b.innerText = o;
        b.onclick = () => checkAns(o);
        container.appendChild(b);
    });
}

function playCurrentWord() {
    if(!currentQ || gameState.currentMode !== 'spelling') return;
    const msg = new SpeechSynthesisUtterance();
    msg.text = currentQ.word;
    msg.lang = 'en-US';
    window.speechSynthesis.speak(msg);
}

function checkAns(sel) {
    const isSpelling = (gameState.currentMode === 'spelling');
    const correctAns = isSpelling ? currentQ.word.toLowerCase() : currentQ.meaning;
    const userInput = isSpelling ? sel.toLowerCase().trim() : sel;

    if(userInput === correctAns) {
        // 拼字模式獎勵 EXP 較多
        const reward = isSpelling ? 35 : 25;
        gainExp(reward);
    } else {
        alert("差一點！正確答案是：" + correctAns);
    }
    nextQ();
    saveState(); 
}

// EXP 與等級邏輯
function gainExp(amount) {
    gameState.exp += amount;
    gameState.eggProgress++;
    
    // 【關鍵修改】孵化檢查：從送文字改成送點陣圖片的 ID
    if(gameState.eggProgress >= 10) {
        const petIds = Object.keys(PET_LIBRARY); // 抓所有圖片ID
        const randomPetId = petIds[Math.floor(Math.random()*petIds.length)]; // 隨機挑一個ID
        gameState.myPets.push(randomPetId); // 保存圖片ID
        gameState.eggProgress = 0;
        updateUI();
        alert("🐣 孵化通訊成功！新的太空夥伴加入隊伍");
    }

    if(gameState.exp >= gameState.expNeed) {
        gameState.lv++;
        gameState.exp -= gameState.expNeed;
        gameState.expNeed = Math.floor(gameState.expNeed * 1.2);
        alert("🆙 升級！等級達到 " + gameState.lv);
    }
    updateUI();
}

// 鍵盤監聽
document.addEventListener('keydown', (e) => {
    if(gameState.currentMode === 'spelling' && e.key === 'Enter') {
        checkAns(document.getElementById('spell-input').value);
    }
});

// 初始化
window.onload = () => {
    loadState();
    updateUI();
};
</script>
