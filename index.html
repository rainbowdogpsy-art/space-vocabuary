<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>太空單字探險家 v10.0 - 彩虹狗狗老師 (全連線完工版)</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #05050d; --neon: #00f2fe; --accent: #ff00de; --glass: rgba(20, 20, 45, 0.95); }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', "Microsoft JhengHei", sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; background-image: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%); }
        #game-container { width: 95%; max-width: 440px; background: var(--glass); backdrop-filter: blur(15px); border-radius: 24px; padding: 20px; border: 1px solid rgba(0, 242, 254, 0.3); text-align: center; position: relative; box-shadow: 0 0 25px rgba(0,0,0,0.5); }
        
        /* 狀態列 */
        .header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; text-align: left; }
        .avatar-box { width: 64px; height: 64px; background: rgba(0,0,0,0.5); border-radius: 12px; border: 2px solid var(--neon); display: flex; align-items: center; justify-content: center; flex-shrink: 0; box-shadow: 0 0 10px rgba(0,242,254,0.3); overflow: hidden; }
        .avatar-svg { width: 100%; height: 100%; image-rendering: pixelated; }
        .header-content { flex-grow: 1; }
        .lv-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .lv-tag { background: linear-gradient(45deg, #ffd700, #ffa500); color: #000; padding: 2px 10px; border-radius: 50px; font-weight: bold; font-size: 0.75em; }
        .user-title { color: var(--neon); font-size: 0.75em; font-weight: bold; margin-top: 2px; }
        .exp-bg { width: 100%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; border: 1px solid #333; }
        #exp-fill { height: 100%; background: var(--neon); width: 0%; transition: width 0.4s; }

        .screen { display: none; animation: fadeIn 0.3s; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .btn-mode { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.15); padding: 15px; border-radius: 15px; margin-bottom: 8px; cursor: pointer; transition: 0.2s; width: 100%; color: white; }
        .btn-mode:hover { border-color: var(--neon); background: rgba(0,242,254,0.15); transform: translateY(-2px); }
        .btn-mode h3 { margin: 0 0 3px 0; font-size: 1.05em; }
        .btn-mode p { margin: 0; font-size: 0.7em; color: #aaa; }

        .arena { height: 110px; display: flex; flex-direction: column; justify-content: center; align-items: center; margin-bottom: 10px; }
        #monster { font-size: 55px; animation: float 3s infinite ease-in-out; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        
        .btn-opt { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); padding: 12px; border-radius: 12px; cursor: pointer; margin-bottom: 8px; width: 100%; }
        .btn-opt:hover { background: var(--neon); color: #000; font-weight: bold; }
        .btn-opt.active { border-color: var(--accent); background: rgba(255,0,222,0.2); color: white; font-weight: bold; }

        #spell-in { width: 85%; padding: 15px; font-size: 1.6em; text-align: center; border-radius: 15px; border: 2px solid var(--neon); background: #000; color: var(--neon); outline: none; font-family: monospace; }
        .back-btn { background: rgba(255,255,255,0.1); border: 1px solid #555; color: #fff; cursor: pointer; padding: 6px 15px; border-radius: 8px; font-size: 0.8em; margin-bottom: 10px; }
        
        .lib-list { display: flex; flex-direction: column; gap: 10px; max-height: 320px; overflow-y: auto; padding: 5px; text-align: left; }
        .pet-card { background: rgba(255, 255, 255, 0.08); border-radius: 15px; padding: 12px; border: 1px solid #444; display: flex; align-items: center; gap: 15px; }
        .pet-img-box { width: 45px; height: 45px; background: rgba(0,0,0,0.4); border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .pet-svg { width: 35px; height: 35px; image-rendering: pixelated; }
        .pet-info h4 { margin: 0; color: var(--neon); font-size: 1em; }
        .pet-info p { margin: 4px 0 0 0; font-size: 0.75em; color: #ccc; line-height: 1.4; }
        
        .story-box { background: rgba(0,0,0,0.5); border: 1px solid var(--accent); border-radius: 15px; padding: 20px; line-height: 1.8; text-align: left; font-size: 0.9em; max-height: 250px; overflow-y: auto; }
        .rank-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #333; font-size: 0.9em; align-items: center; }
    </style>
</head>
<body>

<div id="game-container">
    <div class="header">
        <div id="player-avatar" class="avatar-box"></div>
        <div class="header-content">
            <div class="lv-info">
                <div><span class="lv-tag">RANK LV <span id="lv">1</span></span><div id="display-title" class="user-title">探險成員</div></div>
                <span id="display-name" style="font-size: 0.8em; color: #fff; font-weight:bold;">探險家</span>
            </div>
            <div class="exp-bg"><div id="exp-fill"></div></div>
        </div>
    </div>

    <div id="scr-menu" class="screen active">
        <h2 style="color:var(--neon); margin-bottom:12px; text-shadow:0 0 10px var(--neon);">🐾 太空探險家 v10.0</h2>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px;">
            <button class="btn-mode" onclick="showSettings()"><h3>🛰️ 角色設定</h3><p>更換形象名稱</p></button>
            <button class="btn-mode" onclick="showLeaderboard()"><h3>🏆 榮譽榜</h3><p>全校連線排行</p></button>
        </div>
        <button id="btn-daily" class="btn-mode" onclick="startDaily()" style="background:rgba(255,215,0,0.1); border-color:#ffd700;"><h3>📅 每日挑戰 (Daily)</h3><p id="daily-status">15題挑戰領100EXP</p></button>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px;">
            <button class="btn-mode" onclick="startMode('mcq')"><h3>⚔️ 選擇題</h3><p>10連擊解鎖</p></button>
            <button class="btn-mode" onclick="startMode('spelling')"><h3>🎧 拼字戰</h3><p>累積10題解鎖</p></button>
        </div>
        <button class="btn-mode" onclick="showStoryList()"><h3>📖 故事模式</h3><p>15篇星際航誌</p></button>
        <button class="btn-mode" onclick="showLibrary()"><h3>🐾 夥伴圖鑑</h3><p>檢視探險小隊</p></button>
    </div>

    <div id="scr-settings" class="screen">
        <div style="text-align:left;"><button class="back-btn" onclick="toHome()">🏠 返回</button></div>
        <h3 style="color:var(--neon);">探險家終端</h3>
        <p style="font-size:0.8em; color:#aaa; margin-bottom:10px;">請選擇性別形象：</p>
        <div style="display:flex; gap:10px; margin-bottom:20px;">
            <button id="gen-m" class="btn-opt" onclick="setGender('M')">男生探險家</button>
            <button id="gen-f" class="btn-opt" onclick="setGender('F')">女生探險家</button>
        </div>
        <p style="font-size:0.8em; color:#aaa; margin-bottom:5px;">請輸入探險家名稱：</p>
        <input type="text" id="name-in" style="background:#000; border:1px solid #444; color:#fff; padding:15px; border-radius:12px; width:80%; text-align:center;" maxlength="8" placeholder="輸入名稱...">
        <button class="btn-opt" style="margin-top:20px; border-color:var(--neon);" onclick="saveSettings()">確認並同步雲端</button>
    </div>

    <div id="scr-game" class="screen">
        <div style="text-align:left;"><button class="back-btn" onclick="toHome()">🏠 退出</button></div>
        <div id="hatch-hint" style="color:var(--neon); font-size:0.8em; margin-bottom:5px;"></div>
        <div class="arena"><div id="monster">👾</div><h2 id="display-q"></h2></div>
        <div id="mcq-box" style="display:flex; flex-direction:column;"></div>
        <div id="spell-box" style="display:none;">
            <p id="spell-hint" style="color:var(--accent); font-weight:bold;"></p>
            <input type="text" id="spell-in" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" placeholder="請拼寫...">
            <p style="font-size:0.7em; color:#666; margin-top:10px;">手動拼寫練習 (不支援自動選字)</p>
        </div>
    </div>

    <div id="scr-rank" class="screen"><div style="text-align:left;"><button class="back-btn" onclick="toHome()">🏠 返回</button></div><h3 style="color:var(--neon);">🏆 全校探險榜</h3><div id="rank-list" class="lib-list">正在接收雲端訊號...</div></div>
    <div id="scr-lib" class="screen"><div style="text-align:left;"><button class="back-btn" onclick="toHome()">🏠 返回</button></div><div id="lib-list" class="lib-list"></div></div>
    <div id="scr-story-list" class="screen"><div style="text-align:left;"><button class="back-btn" onclick="toHome()">🏠 返回</button></div><div id="story-list" class="lib-list"></div></div>
    <div id="scr-story-read" class="screen"><div style="text-align:left;"><button class="back-btn" onclick="showStoryList()">⬅️ 返回</button></div><h3 id="story-title" style="color:var(--neon);"></h3><div id="story-content" class="story-box"></div><button class="btn-opt" style="margin-top:15px;" onclick="showStoryList()">我讀完了！</button></div>

    <div style="margin-top:10px; border-top:1px solid #333; padding-top:10px; font-size:0.8em; color:#888;">夥伴孵化能量: <span id="egg-val">0</span> / 10</div>
</div>

<script>
// --- Firebase 初始化 ---
const firebaseConfig = {
  apiKey: "AIzaSyBdEDFM_zllcQM8aILmfM5cvo_Rm3ouf90",
  authDomain: "space-voc.firebaseapp.com",
  projectId: "space-voc",
  storageBucket: "space-voc.firebasestorage.app",
