<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #05050d; --neon: #00f2fe; --accent: #ff00de; --glass: rgba(20, 20, 45, 0.95); }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; background-image: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%); }
        #game-container { width: 95%; max-width: 440px; background: var(--glass); backdrop-filter: blur(15px); border-radius: 24px; padding: 20px; border: 1px solid rgba(0, 242, 254, 0.3); text-align: center; position: relative; box-shadow: 0 0 25px rgba(0,0,0,0.5); }
        
        /* 狀態列 */
        .header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; text-align: left; }
        .avatar-box { width: 64px; height: 64px; background: rgba(0,0,0,0.6); border-radius: 12px; border: 2px solid var(--neon); display: flex; align-items: center; justify-content: center; flex-shrink: 0; overflow: hidden; }
        .avatar-svg { width: 100%; height: 100%; image-rendering: pixelated; }
        .header-content { flex-grow: 1; }
        .lv-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .lv-tag { background: linear-gradient(45deg, #ffd700, #ffa500); color: #000; padding: 2px 10px; border-radius: 50px; font-weight: bold; font-size: 0.75em; }
        .user-title { color: var(--neon); font-size: 0.75em; font-weight: bold; }
        .exp-bg { width: 100%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; border: 1px solid #333; }
        #exp-fill { height: 100%; background: var(--neon); width: 0%; transition: width 0.4s; }

        .screen { display: none; animation: fadeIn 0.3s; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .btn-mode { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.15); padding: 12px; border-radius: 15px; margin-bottom: 8px; cursor: pointer; width: 100%; color: white; transition: 0.2s; }
        .btn-mode:hover { border-color: var(--neon); transform: translateY(-2px); background: rgba(0,242,254,0.1); }
        .btn-mode h3 { margin: 0 0 3px 0; font-size: 1.05em; }
        .btn-mode p { margin: 0; font-size: 0.7em; color: #aaa; }

        .arena { height: 100px; display: flex; flex-direction: column; justify-content: center; align-items: center; margin-bottom: 10px; }
        #monster { font-size: 50px; animation: float 3s infinite ease-in-out; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        
        .btn-opt { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); padding: 12px; border-radius: 12px; cursor: pointer; margin-bottom: 8px; width: 100%; }
        .btn-opt:hover { background: var(--neon); color: #000; }
        .btn-opt.active { border: 2px solid var(--accent); background: rgba(255,0,222,0.2); }

        #spell-in { width: 85%; padding: 12px; font-size: 1.5em; text-align: center; border-radius: 15px; border: 2px solid var(--neon); background: #000; color: var(--neon); outline: none; }
        .back-btn { background: rgba(255,255,255,0.1); border: 1px solid #555; color: #fff; cursor: pointer; padding: 6px 15px; border-radius: 8px; font-size: 0.8em; margin-bottom: 10px; }
        
        .lib-list { display: flex; flex-direction: column; gap: 10px; max-height: 300px; overflow-y: auto; padding: 5px; text-align: left; }
        .pet-card { background: rgba(255, 255, 255, 0.08); border-radius: 15px; padding: 12px; border: 1px solid #444; display: flex; align-items: center; gap: 15px; cursor: pointer; }
        .pet-img-box { width: 45px; height: 45px; background: rgba(0,0,0,0.4); border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .pet-svg { width: 35px; height: 35px; image-rendering: pixelated; }
        
        .story-box { background: rgba(0,0,0,0.5); border: 1px solid var(--accent); border-radius: 15px; padding: 20px; line-height: 1.8; text-align: left; font-size: 0.9em; max-height: 220px; overflow-y: auto; margin-top: 10px; }
        .rank-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #333; font-size: 0.9em; }
    </style>
</head>
<body>

<div id="game-container">

        <div id="player-avatar" class="avatar-box"></div>
        <div class="header-content">
            <div class="lv-info">
                <div><span class="lv-tag">RANK LV <span id="lv">1</span></span><div id="display-title" class="user-title">探險成員</div></div>
                <span id="display-name" style="font-size: 0.85em; color: #fff; font-weight:bold;">探險家</span>
            </div>
            <div class="exp-bg"><div id="exp-fill"></div></div>
        </div>

    <div id="scr-menu" class="screen active">
        <h2 style="color:var(--neon); margin-bottom:12px;">🐾 太空探險家 v11.0</h2>
        <button class="btn-mode" onclick="showStoryList()" style="border-color:var(--accent);"><h3>📖 冒險航誌：故事模式</h3><p>閱讀解鎖夥伴的 15 篇史詩</p></button>
        <button class="btn-mode" onclick="startReview()"><h3>📡 星際廣播：放送複習</h3><p>觀看單字領取 50 EXP</p></button>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px;">
            <button class="btn-mode" onclick="showSettings()"><h3>🛰️ 角色設定</h3><p>更換形象</p></button>
            <button class="btn-mode" onclick="showLeaderboard()"><h3>🏆 榮譽榜</h3><p>雲端排名</p></button>
        </div>
        <button id="btn-daily" class="btn-mode" onclick="startDaily()" style="background:rgba(255,215,0,0.1); border-color:#ffd700;"><h3>📅 每日挑戰</h3><p id="daily-status">雙倍經驗獎勵</p></button>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px;">
            <button class="btn-mode" onclick="startMode('mcq')"><h3>⚔️ 選擇題</h3><p>10連擊解鎖</p></button>
            <button class="btn-mode" onclick="startMode('spelling')"><h3>🎧 拼字戰</h3><p>累積挑戰</p></button>
        </div>
    </div>

    <div id="scr-story-list" class="screen">
        <div style="text-align:left;"><button class="back-btn" onclick="toHome()">🏠 返回主選單</button></div>

        <div id="story-list" class="lib-list"></div>
    </div>

    <div id="scr-story-read" class="screen">
        <div style="text-align:left;"><button class="back-btn" onclick="showStoryList()">⬅️ 返回列表</button></div>
        <div id="story-pet-img" class="avatar-box" style="margin: 0 auto 10px;"></div>
        <h3 id="story-title" style="color:var(--neon); margin: 5px 0;"></h3>
        <div id="story-content" class="story-box"></div>
        <button class="btn-opt" style="margin-top:15px;" onclick="showStoryList()">我讀完了！</button>
    </div>

    <div id="scr-review" class="screen"><div style="text-align:left;"><button class="back-btn" onclick="toHome()">🏠 返回</button></div><div class="rev-card"><h1 id="rev-word" style="color:var(--neon); margin:0;"></h1><p id="rev-meaning" style="margin-top:10px;"></p></div><button class="btn-opt" onclick="nextReviewWord()">下一步</button></div>
    <div id="scr-settings" class="screen"><div style="text-align:left;"><button class="back-btn" onclick="toHome()">🏠 返回</button></div><div style="display:flex; gap:10px; margin-bottom:15px;"><button id="gen-m" class="btn-opt" onclick="setGender('M')">男生</button><button id="gen-f" class="btn-opt" onclick="setGender('F')">女生</button></div><input type="text" id="name-in" style="background:#000; border:1px solid #444; color:#fff; padding:15px; border-radius:12px; width:80%; text-align:center;" maxlength="8"><button class="btn-opt" style="margin-top:15px;" onclick="saveSettings()">同步雲端</button></div>
    <div id="scr-game" class="screen"><div style="text-align:left;"><button class="back-btn" onclick="toHome()">🏠 退出</button></div><div id="hatch-hint" style="color:var(--neon); font-size:0.8em; margin-bottom:5px;"></div><div class="arena"><div id="monster">👾</div><h2 id="display-q"></h2></div><div id="mcq-box" style="display:flex; flex-direction:column;"></div><div id="spell-box" style="display:none;"><p id="spell-hint" style="color:var(--accent); font-weight:bold;"></p><input type="text" id="spell-in" autocomplete="off" placeholder="請拼寫..."></div></div>
    <div id="scr-rank" class="screen"><div style="text-align:left;"><button class="back-btn" onclick="toHome()">🏠 返回</button></div><div id="rank-list" class="lib-list">正在接收訊號...</div></div>

    <div style="margin-top:10px; border-top:1px solid #333; padding-top:10px; font-size:0.8em; color:#888;">夥伴孵化能量: <span id="egg-val">0</span> / 10</div>
</div>

<script>
// --- Firebase ---
const firebaseConfig = { apiKey: "AIzaSyBdEDFM_zllcQM8aILmfM5cvo_Rm3ouf90", authDomain: "space-voc.firebaseapp.com", projectId: "space-voc", storageBucket: "space-voc.firebasestorage.app", messagingSenderId: "951077212797", appId: "1:951077212797:web:c6a37bf911870277585714", measurementId: "G-DTRDP4LMCG", databaseURL: "https://space-voc-default-rtdb.firebaseio.com/" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// --- 15 位小夥伴資料庫 ---
const PETS = [
    {n:"太陽小暖",d:"汪汪星暖男。",s:'<svg viewBox="0 0 10 10"><path d="M2 3h1v1H2zm5 0h1v1H7zm-3 4h2v1H4zm-1-3h4v4H3z" fill="#ffd700"/><circle cx="4.5" cy="4.5" r="0.5" fill="#000"/></svg>',story:"【冒險 0-1：初遇暖陽】探險家在恆星軌道邊緣救下了能量微弱的小暖。牠原本是星系核心的守護者，卻被黑洞侵蝕導致記憶模糊。為了報答你，小暖決定指引你尋找失散在銀河各處的探險隊成員。牠告訴你，飛船的通訊系統零件就在附近的太空廢墟中。"},
    {n:"星際貓貓",d:"傲嬌領航員。",s:'<svg viewBox="0 0 10 10"><path d="M2 2h1v1H2zm5 0h1v1H7zm-5 2h6v4H2z" fill="#a020f0"/><path d="M3 5h1v1H3zm3 0h1v1H6z" fill="#fff"/></svg>',story:"【冒險 0-2：罐頭星雲】追隨小暖的指引，你在廢棄太空站遇見了貓貓。牠曾是旗艦『語音號』的領航員，正守護著被冰封的物資。貓貓非常傲嬌，但在你分享了單字能量後，牠決定帶你前往神祕的冷卻星雲，那裡隱藏著能驅動引擎的古老能量精靈。"},
    {n:"青晶靈",d:"能量導航員。",s:'<svg viewBox="0 0 10 10"><path d="M3 4h4v5H3zm-1 2h6v2H2z" fill="#00f2fe"/><circle cx="5" cy="6" r="1" fill="#000"/></svg>',story:"【冒險 0-3：能量共鳴】在貓貓提到的星雲中，青晶靈現身了。牠是由純粹的知識數據構成。青晶靈用純淨能量重新點亮了飛船核心。透過牠的感應，你們接收到了來自遠方熾熱岩漿星球傳來的微弱求救訊號，大家立刻啟程前去救援，正式開啟這段征途。"},
    {n:"火紅岩獸",d:"堅硬守護者。",s:'<svg viewBox="0 0 10 10"><path d="M4 2h2v6H4zM2 4h6v2H2z" fill="#ff3131"/><rect x="4" y="4" width="2" height="2" fill="#fff"/></svg>',story:"【冒險 0-4：岩漿茶會】抵達岩漿星，火紅岩獸正用龐大的身軀抵擋著致命的流星雨，保護著一個受損嚴重的機器人。岩獸雖然外表冷酷，其實內心極度害羞。在你們協助修復機器人後，岩獸決定成為隊伍的盾牌，與老友一起跟隨探險家去征服未知的星辰大海。"},
    {n:"機機器人",d:"單字庫助教。",s:'<svg viewBox="0 0 10 10"><path d="M3 2h4v5H3zm2 5h2v-1H4z" fill="#888"/><rect x="4" y="3" width="2" height="1" fill="#00f2fe"/></svg>',story:"【冒險 0-5：代碼修復】被岩獸守護的正是在『大崩壞』中失蹤的機機器人。重新開機後，牠同步了全宇宙最新的單字資料庫。機器人冷靜地分析出：前方有強大的電磁風暴區，我們需要一位速度極快的夥伴幫忙引路，否則飛船會被混亂的雜訊撕裂，旅程將在此中斷。"},
    {n:"閃電雲朵",d:"速度推進器。",s:'<svg viewBox="0 0 10 10"><path d="M2 4h6v2H2zM4 2h2v6H4z" fill="#ffff00"/></svg>',story:"【冒險 0-6：閃電追逐】機器人與愛玩的閃電雲達成協定：只要雲朵幫飛船加速穿過風暴，就分享新奇的星際數據給牠。雲朵開心地成為了推進器，飛船速度大幅提升。但因為速度太快，大家差點撞上了一個隱藏在風暴陰影中、正在默默工作的神祕小傢伙。"},
    {n:"幽靈泡泡",d:"隱身修補工。",s:'<svg viewBox="0 0 10 10"><path d="M3 2h4v6H3z" fill="#e0e0e0" opacity="0.6"/><circle cx="4" cy="4" r="0.5" fill="#000"/></svg>',story:"【冒險 0-7：隱形的守護】穿過風暴後，幽靈泡泡現身了。原來牠一直跟在大家後面清理留下的電離垃圾並修補船體。泡泡擅長偽裝與潛行，牠帶領隊伍繞過敵方監視器，潛入了一片被神祕種子覆蓋、充滿純淨氧氣的綠色秘境，尋找被遺忘的星系藍圖。"},
    {n:"萌翠種子",d:"生命工程師。",s:'<svg viewBox="0 0 10 10"><path d="M4 8h2V5H4zm-1-3h4v1H3zm2-3h1v2H5z" fill="#32cd32"/></svg>',story:"【冒險 0-8：綠色星球】在秘境核心，萌翠種子因能量不足而枯萎。泡泡用身體保護牠，小暖提供溫暖陽光。種子終於綻放並釋放純淨氧氣。種子告訴大家，想重建星系秩序，必須前往銀河最北方的極寒之地，尋找失傳已久的最後防衛核心碎片，那裡由一位極地戰士守護。"},
    {n:"冰晶企鵝",d:"極地守衛者。",s:'<svg viewBox="0 0 10 10"><path d="M3 3h4v6H3z" fill="#1e90ff"/><path d="M4 4h1v1H4zm1 0h1v1H5z" fill="#fff"/></svg>',story:"【冒險 0-9：極低溫保存】極寒之地中，冰晶企鵝冷靜地守護著碎片。牠原以為探險家是掠奪者，直到看見種子開出的友誼之花，才相信你們的善意。企鵝卸下武裝加入了小隊。現在，所有基礎防禦已完備，大家準備迎接黑洞封印戰，面對即將到來的巨大空間壓迫。"},
    {n:"金屬巨蟹",d:"最強防禦王。",s:'<svg viewBox="0 0 10 10"><path d="M2 5h6v3H2zM1 4h2v1H1zm6 0h2v1H7z" fill="#ff4500"/></svg>',story:"【冒險 0-10：鋼鐵守衛】當黑洞壓力席捲而來，金屬巨蟹挺身而出，與企鵝的冰盾結合成最強防禦網。原來所有夥伴的集結都是為了這一天。在你的單字能量帶領下，大家終於重塑了星系秩序，擊退了黑暗。大家驚訝地發現，黑洞背後竟是一個全新的彩色維度裂縫。"},
    {n:"幻影蝶影",d:"維度導航員。",s:'<svg viewBox="0 0 10 10"><path d="M2 3h2v4H2zm4 0h2v4H6z" fill="#ff00de"/><path d="M4 4h2v2H4z" fill="#fff"/></svg>',story:"【冒險 0-11：維度裂縫】成功封印黑洞後，幻影蝶影在時空裂縫中閃現。牠揮動翅膀散發出迷幻鱗粉，揭示了一條通往『單字聖殿』的隱藏路徑。大家發現黑洞之後，竟是一個全新的彩虹維度，這裡的規則完全不同。蝶影將引領你們穿過夢境與現實的邊界，尋找最終真相。"},
    {n:"烈焰龍龍",d:"神級火力手。",s:'<svg viewBox="0 0 10 10"><path d="M2 5h6v4H2zM4 2h2v3H4z" fill="#ff4500"/><circle cx="5" cy="4" r="0.5" fill="#fff"/></svg>',story:"【冒險 0-12：烈焰試煉】在維度入口，烈焰龍龍擋住了去路。唯有證明自己的單字量與鬥志，才能獲得這位遠古守護神的認可。經過一番驚天動地的單字對決，龍龍被大家展現出的默契與毅力感動。牠決定加入隊伍，成為探險隊中最強大的火力支援，協助大家掃平聖殿前的障礙。"},
    {n:"時空發條",d:"時間修復師。",s:'<svg viewBox="0 0 10 10"><circle cx="5" cy="5" r="4" fill="#cd7f32"/><path d="M5 3v2h2" stroke="white" fill="none"/></svg>',story:"【冒險 0-13：時空修正】新維度中的時間感極度混亂，時空發條正忙著修復破碎的時間齒輪。牠告訴大家，聖殿的大門每隔百年才開啟僅僅一秒鐘。必須依靠牠的精準計時，探險隊才能在正確的瞬間跳入。在發條的倒數聲中，大家全神貫注，準備迎接這決定命運的關鍵一跳。"},
    {n:"智慧梟梟",d:"宇宙圖書館長。",s:'<svg viewBox="0 0 10 10"><path d="M3 3h4v6H3z" fill="#708090"/><path d="M4 4h1v1H4zm1 0h1v1H5z" fill="yellow"/></svg>',story:"【冒險 0-14：遠古圖書館】智慧梟梟在聖殿入口等待著。牠交給探險家一本空白的航誌，並莊重地說：『文字是文明的火種。你們在旅程中收集的每一個小夥伴，都是通往終極智慧的鑰匙。』現在，只要解開最後一個彩虹封印，全宇宙的智慧之光將會重新被點燃，重塑所有文明。"},
    {n:"虹光獨角獸",d:"奇蹟守護神。",s:'<svg viewBox="0 0 10 10"><path d="M3 4h4v5H3zM4 2h1v2H4z" fill="#e0ffff"/><path d="M4 2h1v1H4z" fill="#ffd700"/></svg>',story:"【冒險 0-15：智慧之光】大門終於徹底開啟，虹光獨角獸踏著繽紛彩虹現身。15 位夥伴全體集結，聖殿內部的知識光芒直衝雲霄，將每個星球的智慧重新連結。獨角獸祝賀探險隊達成了前無古人的成就。現在，你們不僅是冒險者，更是宇宙中真正的單字大師，智慧將永遠伴隨著你們！"}
];

const WORDS = [{w:"afternoon",m:"下午"},{w:"apple",m:"蘋果"},{w:"funny",m:"有趣的"},{w:"giraffe",m:"長頸鹿"},{w:"aunt",m:"阿姨"},{w:"angry",m:"生氣的"},{w:"animal",m:"動物"},{w:"ant",m:"螞蟻"},{w:"arm",m:"手臂"},{w:"ax",m:"斧頭"},{w:"bathroom",m:"浴室"},{w:"bear",m:"熊"},{w:"cute",m:"可愛的"},{w:"dog",m:"狗"},{w:"cat",m:"貓"},{w:"banana",m:"香蕉"},{w:"zebra",m:"斑馬"}];

const AVATARS = {
    M: ['<svg viewBox="0 0 10 10" class="avatar-svg"><path d="M3 2h4v5H3z" fill="#00f2fe"/><path d="M4 3h1v1H4zm1 0h1v1H5z" fill="#000"/></svg>','<svg viewBox="0 0 10 10" class="avatar-svg"><path d="M3 2h4v5H3z" fill="#00f2fe"/><rect x="2" y="3" width="6" height="2" fill="#ff00de" opacity="0.6"/><path d="M4 8h2v2H4z" fill="#ff00de"/></svg>','<svg viewBox="0 0 10 10" class="avatar-svg"><path d="M3 1h4v7H3z" fill="#ffd700"/><circle cx="5" cy="5" r="4" fill="none" stroke="#00f2fe" stroke-width="0.5"/></svg>'],
    F: ['<svg viewBox="0 0 10 10" class="avatar-svg"><path d="M3 2h4v5H3z" fill="#ff77aa"/><path d="M2 2h6v2H2z" fill="#333"/><path d="M4 4h1v1H4zm1 0h1v1H5z" fill="#000"/></svg>','<svg viewBox="0 0 10 10" class="avatar-svg"><path d="M3 2h4v5H3z" fill="#ff77aa"/><path d="M2 1h6v3H2z" fill="#ff00de" opacity="0.4"/><rect x="4" y="8" width="2" height="2" fill="#00f2fe"/></svg>','<svg viewBox="0 0 10 10" class="avatar-svg"><path d="M3 1h4v7H3z" fill="#ffd700"/><path d="M2 1h6v2H2z" fill="#ff00de"/><circle cx="5" cy="5" r="4" fill="none" stroke="#ff00de" stroke-width="0.5"/></svg>']
};

let state = { id: Date.now().toString(), lv: 1, exp: 0, egg: 0, pets: [], name: "探險家", gen: "M", mastered: [], lastD: "" };
let wordPool = [], curQ = null, dailyC = 0, revList = [], revIdx = 0;

// --- UI 控制 ---
function updateUI() {
    const el = (id) => document.getElementById(id);
    if(el('lv')) el('lv').innerText = state.lv;
    if(el('exp-val')) el('exp-val').innerText = state.exp;
    if(el('exp-fill')) el('exp-fill').style.width = (state.exp % 100) + "%";
    if(el('egg-val')) el('egg-val').innerText = state.egg;
    if(el('display-name')) el('display-name').innerText = state.name;
    const ts = ["實習生","拾荒者","搜索官","通訊員","拓荒者","單字神"];
    if(el('display-title')) el('display-title').innerText = ts[Math.min(Math.floor(state.lv/10), 5)];
    let tier = state.lv >= 36 ? 2 : (state.lv >= 11 ? 1 : 0);
    const avatarBox = el('player-avatar');
    if(avatarBox) avatarBox.innerHTML = AVATARS[state.gen || 'M'][tier];
    const h = el('hatch-hint');
    if(h) h.innerText = state.mode==='mcq' ? "⚔️ 連擊挑戰：答錯歸零" : (state.mode==='spelling' ? "🎧 拼字戰：累積對10題解鎖" : "");
}

// --- 故事模式 ---
function showStoryList() {
    showScreen('scr-story-list');
    const list = document.getElementById('story-list');
    list.innerHTML = "";
    if (!state.pets || state.pets.length === 0) {
        list.innerHTML = "<p style='padding:20px; color:#666;'>尚未解鎖任何夥伴故事。</p>";
    } else {
        [...new Set(state.pets)].sort((a,b)=>a-b).forEach(idx => {
            const p = PETS[idx];
            const div = document.createElement('div');
            div.className = 'pet-card';
            div.onclick = () => readStory(idx);
            div.innerHTML = `<div class="pet-img-box">${p.s}</div><div class="pet-info"><h4>${p.n} 的航誌</h4><p>點擊閱讀冒險劇情...</p></div>`;
            list.appendChild(div);
        });
    }
}
function readStory(idx) {
    const p = PETS[idx];
    document.getElementById('story-title').innerText = p.n + " 的故事";
    document.getElementById('story-content').innerText = p.story;
    document.getElementById('story-pet-img').innerHTML = p.s;
    showScreen('scr-story-read');
}

// --- 其他功能 ---
function startReview() { revList = [...WORDS].sort(() => 0.5 - Math.random()).slice(0, 10); revIdx = 0; showScreen('scr-review'); renderRev(); }
function renderRev() { const itm = revList[revIdx]; document.getElementById('rev-word').innerText = itm.w; document.getElementById('rev-meaning').innerText = itm.m; speak(itm.w); }
function nextReviewWord() { if(revIdx < 9) { revIdx++; renderRev(); } else { state.exp += 50; alert("✨ 廣播獎勵 50 EXP！"); toHome(); save(); } }

function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
function toHome() { window.speechSynthesis.cancel(); showScreen('scr-menu'); updateUI(); }
function showSettings() { showScreen('scr-settings'); document.getElementById('name-in').value = state.name; }
function setGender(g) { state.gen = g; updateUI(); }
function saveSettings() { state.name = document.getElementById('name-in').value || "探險家"; save(); toHome(); }

function showLeaderboard() {
    showScreen('scr-rank'); const list = document.getElementById('rank-list');
    db.ref('leaderboard').orderByChild('l').limitToLast(20).once('value', s => {
        const dArr = []; s.forEach(c => { dArr.push(c.val()); }); dArr.reverse();
        list.innerHTML = dArr.map((d,i) => `<div class="rank-item"><span>${i+1}. ${d.n}</span><span>LV ${d.l}</span></div>`).join("");
    });
}

function startMode(m) { state.mode = m; state.egg = 0; showScreen('scr-game'); nextQ(); }
function startDaily() { state.mode = "daily"; dailyC = 0; state.egg = 0; showScreen('scr-game'); nextQ(); }

function nextQ() { 
    if (wordPool.length === 0) wordPool = [...WORDS].sort(() => Math.random() - 0.5);
    curQ = wordPool.pop();
    const isS = state.mode === 'spelling';
    document.getElementById('display-q').innerText = isS ? "❓❓❓" : curQ.w;
    document.getElementById('mcq-box').style.display = isS ? 'none' : 'flex';
    document.getElementById('spell-box').style.display = isS ? 'block' : 'none';
    if(!isS) renderMCQ();
    else { document.getElementById('spell-hint').innerText = curQ.m; document.getElementById('spell-in').value = ""; speak(curQ.w); setTimeout(()=>document.getElementById('spell-in').focus(), 400); }
    updateUI();
}
function renderMCQ() {
    let opts = [curQ.m]; while(opts.length<4){ let r = WORDS[Math.floor(Math.random()*WORDS.length)].m; if(!opts.includes(r))opts.push(r);}
    opts.sort(()=>Math.random()-0.5); const box=document.getElementById('mcq-box'); box.innerHTML="";
    opts.forEach(o=>{ const b=document.createElement('button'); b.className='btn-opt'; b.innerText=o; b.onclick=()=>check(o); box.appendChild(b);});
}
function speak(t){ window.speechSynthesis.cancel(); const m=new SpeechSynthesisUtterance(t); m.lang='en-US'; m.rate=0.85; window.speechSynthesis.speak(m); }

function check(ans) {
    const isS = state.mode === 'spelling';
    const cor = isS ? curQ.w.toLowerCase() : curQ.m;
    const inp = (isS ? document.getElementById('spell-in').value : ans).toLowerCase().trim();
    if(inp === cor) {
        state.exp += 30; state.egg++; if(!state.mastered.includes(curQ.w)) state.mastered.push(curQ.w);
        if(state.mode==='daily' && ++dailyC>=15){ state.exp+=100; state.lastD = new Date().toLocaleDateString(); alert("🎉 獎勵 100 EXP！"); toHome(); save(); return; }
        if(state.egg >= 10){ const r=Math.floor(Math.random()*PETS.length); state.pets.push(r); state.egg=0; alert(`🐣 獲得：${PETS[r].n}！故事模式解鎖新篇章！`); }
    } else {
        if(state.mode==='mcq' || state.mode==='daily') state.egg = 0;
        alert("❌ 答案: "+(isS?curQ.w:curQ.m));
    }
    if(state.exp >= (state.lv*100)){ state.lv++; alert("🆙 RANK UP!"); }
    save(); updateUI(); nextQ();
}

function save() { localStorage.setItem("space_master_v11", JSON.stringify(state)); if(db) db.ref('leaderboard/' + state.id).set({ n: state.name, l: state.lv, m: state.mastered.length, g: state.gen, t: Date.now() }); }
function load() { const s = localStorage.getItem("space_master_v11"); if(s) state = JSON.parse(s); state.gen = state.gen || "M"; updateUI(); }
document.getElementById('spell-in').onkeydown=(e)=>{if(e.key==='Enter')check();};
window.onload=load;
</script>
</body>
</html>
