<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>太空單字探險家 v10.1 - 修復版</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #05050d; --neon: #00f2fe; --accent: #ff00de; --glass: rgba(20, 20, 45, 0.95); }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', "Microsoft JhengHei", sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; background-image: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%); }
        #game-container { width: 95%; max-width: 440px; background: var(--glass); backdrop-filter: blur(15px); border-radius: 24px; padding: 20px; border: 1px solid rgba(0, 242, 254, 0.3); text-align: center; position: relative; }
        .header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; text-align: left; }
        .avatar-box { width: 64px; height: 64px; background: rgba(0,0,0,0.5); border-radius: 12px; border: 2px solid var(--neon); display: flex; align-items: center; justify-content: center; flex-shrink: 0; overflow: hidden; }
        .avatar-svg { width: 100%; height: 100%; image-rendering: pixelated; }
        .header-content { flex-grow: 1; }
        .lv-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .lv-tag { background: linear-gradient(45deg, #ffd700, #ffa500); color: #000; padding: 2px 10px; border-radius: 50px; font-weight: bold; font-size: 0.75em; }
        .user-title { color: var(--neon); font-size: 0.75em; font-weight: bold; }
        .exp-bg { width: 100%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; border: 1px solid #333; }
        #exp-fill { height: 100%; background: var(--neon); width: 0%; transition: width 0.4s; }
        .screen { display: none; animation: fadeIn 0.3s; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .btn-mode { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.15); padding: 15px; border-radius: 15px; margin-bottom: 8px; cursor: pointer; width: 100%; color: white; transition: 0.2s; }
        .btn-mode:hover { border-color: var(--neon); transform: translateY(-2px); }
        .btn-mode h3 { margin: 0 0 3px 0; font-size: 1.05em; }
        .btn-mode p { margin: 0; font-size: 0.7em; color: #aaa; }
        .arena { height: 110px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #monster { font-size: 55px; animation: float 3s infinite ease-in-out; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .btn-opt { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); padding: 12px; border-radius: 12px; cursor: pointer; margin-bottom: 8px; width: 100%; }
        .btn-opt:hover { background: var(--neon); color: #000; font-weight: bold; }
        .btn-opt.active { border-color: var(--accent); background: rgba(255,0,222,0.2); color: white; }
        #spell-in { width: 85%; padding: 15px; font-size: 1.6em; text-align: center; border-radius: 15px; border: 2px solid var(--neon); background: #000; color: var(--neon); outline: none; }
        .back-btn { background: rgba(255,255,255,0.1); border: 1px solid #555; color: #fff; cursor: pointer; padding: 6px 15px; border-radius: 8px; font-size: 0.8em; margin-bottom: 10px; }
        .lib-list { display: flex; flex-direction: column; gap: 10px; max-height: 320px; overflow-y: auto; padding: 5px; text-align: left; }
        .pet-card { background: rgba(255, 255, 255, 0.08); border-radius: 15px; padding: 12px; border: 1px solid #444; display: flex; align-items: center; gap: 15px; }
        .pet-info h4 { margin: 0; color: var(--neon); font-size: 1em; }
        .pet-info p { margin: 4px 0 0 0; font-size: 0.75em; color: #ccc; line-height: 1.4; }
        .story-box { background: rgba(0,0,0,0.5); border: 1px solid var(--accent); border-radius: 15px; padding: 20px; line-height: 1.8; text-align: left; font-size: 0.9em; max-height: 250px; overflow-y: auto; }
        .rank-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #333; font-size: 0.9em; }
    </style>
</head>
<body>

<div id="game-container">
    <div class="header">
        <div id="player-avatar" class="avatar-box"></div>
        <div class="header-content">
            <div class="lv-info">
                <div><span class="lv-tag">RANK LV <span id="lv">1</span></span><div id="display-title" class="user-title">探險成員</div></div>
                <span id="display-name" style="font-size: 0.8em; color: #fff; font-weight:bold;">探險家</span>
            </div>
            <div class="exp-bg"><div id="exp-fill"></div></div>
        </div>
    </div>

    <div id="scr-menu" class="screen active">
        <h2 style="color:var(--neon); margin-bottom:12px; text-shadow:0 0 10px var(--neon);">🐾 太空探險家 v10.1</h2>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px;">
            <button class="btn-mode" onclick="showSettings()"><h3>🛰️ 角色設定</h3><p>設定形象名稱</p></button>
            <button class="btn-mode" onclick="showLeaderboard()"><h3>🏆 榮譽榜</h3><p>全校連線</p></button>
        </div>
        <button id="btn-daily" class="btn-mode" onclick="startDaily()" style="background:rgba(255,215,0,0.1); border-color:#ffd700;"><h3>📅 每日挑戰</h3><p id="daily-status">15題領100EXP</p></button>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px;">
            <button class="btn-mode" onclick="startMode('mcq')"><h3>⚔️ 選擇題</h3><p>10連擊</p></button>
            <button class="btn-mode" onclick="startMode('spelling')"><h3>🎧 拼字戰</h3><p>累積10題</p></button>
        </div>
        <button class="btn-mode" onclick="showStoryList()"><h3>📖 故事模式</h3><p>解鎖冒險航誌</p></button>
        <button class="btn-mode" onclick="showLibrary()"><h3>🐾 夥伴圖鑑</h3><p>查看探險小隊</p></button>
    </div>

    <div id="scr-settings" class="screen"><div style="text-align:left;"><button class="back-btn" onclick="toHome()">🏠 返回</button></div><h3 style="color:var(--neon);">探險家終端</h3><div style="display:flex; gap:10px; margin-bottom:15px;"><button id="gen-m" class="btn-opt" onclick="setGender('M')">男生</button><button id="gen-f" class="btn-opt" onclick="setGender('F')">女生</button></div><input type="text" id="name-in" style="background:#000; border:1px solid #444; color:#fff; padding:15px; border-radius:12px; width:80%; text-align:center;" maxlength="8" placeholder="輸入名稱..."><button class="btn-opt" style="margin-top:15px; border-color:var(--neon);" onclick="saveSettings()">確認同步</button></div>
    <div id="scr-game" class="screen"><div style="text-align:left;"><button class="back-btn" onclick="toHome()">🏠 退出</button></div><div id="hatch-hint" style="color:var(--neon); font-size:0.8em; margin-bottom:5px;"></div><div class="arena"><div id="monster">👾</div><h2 id="display-q"></h2></div><div id="mcq-box" style="display:flex; flex-direction:column;"></div><div id="spell-box" style="display:none;"><p id="spell-hint" style="color:var(--accent); font-weight:bold;"></p><input type="text" id="spell-in" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" placeholder="請拼寫..."><p style="font-size:0.7em; color:#666; margin-top:10px;">手動拼寫 (停用智慧選字)</p></div></div>
    <div id="scr-rank" class="screen"><div style="text-align:left;"><button class="back-btn" onclick="toHome()">🏠 返回</button></div><h3 style="color:var(--neon);">🏆 全校探險榜</h3><div id="rank-list" class="lib-list">正在接收訊號...</div></div>
    <div id="scr-lib" class="screen"><div style="text-align:left;"><button class="back-btn" onclick="toHome()">🏠 返回</button></div><div id="lib-list" class="lib-list"></div></div>
    <div id="scr-story-list" class="screen"><div style="text-align:left;"><button class="back-btn" onclick="toHome()">🏠 返回</button></div><div id="story-list" class="lib-list"></div></div>
    <div id="scr-story-read" class="screen"><div style="text-align:left;"><button class="back-btn" onclick="showStoryList()">⬅️ 返回</button></div><h3 id="story-title" style="color:var(--neon);"></h3><div id="story-content" class="story-box"></div><button class="btn-opt" style="margin-top:15px;" onclick="showStoryList()">讀完了！</button></div>

    <div style="margin-top:10px; border-top:1px solid #333; padding-top:10px; font-size:0.8em; color:#888;">夥伴能量: <span id="egg-val">0</span> / 10</div>
</div>

<script>
// --- Firebase ---
const firebaseConfig = { apiKey: "AIzaSyBdEDFM_zllcQM8aILmfM5cvo_Rm3ouf90", authDomain: "space-voc.firebaseapp.com", projectId: "space-voc", storageBucket: "space-voc.firebasestorage.app", messagingSenderId: "951077212797", appId: "1:951077212797:web:c6a37bf911870277585714", measurementId: "G-DTRDP4LMCG", databaseURL: "https://space-voc-default-rtdb.firebaseio.com/" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// --- 夥伴資料庫 (15位) ---
const PETS = [
    {n:"太陽小暖",d:"汪汪星暖男，散發正能量。",s:'<svg viewBox="0 0 10 10"><path d="M2 3h1v1H2zm5 0h1v1H7zm-3 4h2v1H4zm-1-3h4v4H3z" fill="#ffd700"/><circle cx="4.5" cy="4.5" r="0.5" fill="#000"/></svg>',story:"探險家在軌道邊緣救下小暖。牠原是核心守護者，卻被黑洞侵蝕。為了報答，小暖指引你尋找失散成員。"},
    {n:"星際貓貓",d:"傲嬌領航員，能預知能源位置。",s:'<svg viewBox="0 0 10 10"><path d="M2 2h1v1H2zm5 0h1v1H7zm-5 2h6v4H2z" fill="#a020f0"/><path d="M3 5h1v1H3zm3 0h1v1H6z" fill="#fff"/></svg>',story:"追隨小暖指引，在廢棄太空站遇見貓貓。牠曾是旗艦『語音號』的領航員。貓貓決定帶你解開能量封印。"},
    {n:"青晶靈",d:"宇宙能量化身，指引方向。",s:'<svg viewBox="0 0 10 10"><path d="M3 4h4v5H3zm-1 2h6v2H2z" fill="#00f2fe"/><circle cx="5" cy="6" r="1" fill="#000"/></svg>',story:"青晶靈用純淨能量點亮飛船。透過牠，你們收到了岩漿星球的求救訊號，大家立刻啟程救援。"},
    {n:"火紅岩獸",d:"堅硬石頭，內心害羞。",s:'<svg viewBox="0 0 10 10"><path d="M4 2h2v6H4zM2 4h6v2H2z" fill="#ff3131"/><rect x="4" y="4" width="2" height="2" fill="#fff"/></svg>',story:"岩漿星上，火紅岩獸正守護報廢機器人。牠款待大家溫暖咖啡，決定與老友機器人一起加入隊伍。"},
    {n:"機機器人",d:"內建單字庫，最強學習助教。",s:'<svg viewBox="0 0 10 10"><path d="M3 2h4v5H3zm2 5h2v-1H4z" fill="#888"/><rect x="4" y="3" width="2" height="1" fill="#00f2fe"/></svg>',story:"重新開機後，機器人同步了宇宙單字庫：『學習程序啟動，探險家，讓我們征服這片星系！』"},
    {n:"閃電雲朵",d:"速度極快電系精靈。",s:'<svg viewBox="0 0 10 10"><path d="M2 4h6v2H2zM4 2h2v6H4z" fill="#ffff00"/></svg>',story:"雲朵同意幫飛船加速穿過風暴，換取新奇數據。雲朵成為最強推進器，飛船速度大幅提升。"},
    {n:"幽靈泡泡",d:"擅長隱身，默默清理垃圾。",s:'<svg viewBox="0 0 10 10"><path d="M3 2h4v6H3z" fill="#e0e0e0" opacity="0.6"/></svg>',story:"泡泡現身了，原來牠一直在清除垃圾。牠帶領隊伍繞過監視，潛入一片充滿氧氣的綠色秘境。"},
    {n:"萌翠種子",d:"草系夥伴，將知識轉為森林。",s:'<svg viewBox="0 0 10 10"><path d="M4 8h2V5H4zm-1-3h4v1H3zm2-3h1v2H5z" fill="#32cd32"/></svg>',story:"種子因能量不足枯萎，大家協力提供陽光。種子開花並指引大家前往極寒之地，尋找防衛核心。"},
    {n:"冰晶企鵝",d:"冷靜守衛，守護核心。",s:'<svg viewBox="0 0 10 10"><path d="M3 3h4v6H3z" fill="#1e90ff"/><path d="M4 4h1v1H4z" fill="#fff"/></svg>',story:"企鵝見到種子開出的友誼之花，終於卸下武裝加入你們。現在，大家準備好黑洞封印戰。"},
    {n:"金屬巨蟹",d:"最強盾牌，擊碎空間壓力。",s:'<svg viewBox="0 0 10 10"><path d="M2 5h6v3H2zM1 4h2v1H1zm6 0h2v1H7z" fill="#ff4500"/></svg>',story:"黑洞壓力席捲時，巨蟹形成最強盾牌。原來夥伴集結就是為了這天，大家終於重塑了星系秩序。"},
    {n:"幻影蝶影",d:"穿梭夢境，引導靈魂。",s:'<svg viewBox="0 0 10 10"><path d="M2 3h2v4H2zm4 0h2v4H6z" fill="#ff00de"/></svg>',story:"重塑秩序後，蝶影在裂縫閃現，揭示通往『單字聖殿』的路徑。黑洞之後竟是全新彩虹維度。"},
    {n:"烈焰龍龍",d:"守護神，擁有燃燒鬥志。",s:'<svg viewBox="0 0 10 10"><path d="M2 5h6v4H2zM4 2h2v3H4z" fill="#ff4500"/></svg>',story:"在入口，龍龍擋住去路。唯有證明單字量才能獲得認可。激戰後龍龍決定成為最強火力支援。"},
    {n:"時空發條",d:"精準無比，修正時間漏洞。",s:'<svg viewBox="0 0 10 10"><circle cx="5" cy="5" r="4" fill="#cd7f32"/></svg>',story:"發條忙著修復齒輪。牠告訴大家聖殿大門每百年才開一秒，必須依靠牠精準計時才能進入。"},
    {n:"智慧梟梟",d:"紀錄官，知曉全宇宙單字。",s:'<svg viewBox="0 0 10 10"><path d="M3 3h4v6H3z" fill="#708090"/></svg>',story:"梟梟在門口等待，交給你一本空白航誌：『文字是文明火種，收集的夥伴是通往智慧的鑰匙。』"},
    {n:"虹光獨角獸",d:"奇蹟象徵，聖殿最終引導。",s:'<svg viewBox="0 0 10 10"><path d="M3 4h4v5H3zM4 2h1v2H4z" fill="#e0ffff"/></svg>',story:"大門開啟，獨角獸踏彩虹現身。15位夥伴集結，光芒衝天。恭喜！你已成為真正的單字大師！"}
];

const WORDS = [{w:"afternoon",m:"下午"},{w:"funny",m:"有趣的"},{w:"giraffe",m:"長頸鹿"},{w:"aunt",m:"阿姨"},{w:"angry",m:"生氣的"},{w:"animal",m:"動物"},{w:"ant",m:"螞蟻"},{w:"arm",m:"手臂"},{w:"ax",m:"斧頭"},{w:"bathroom",m:"浴室"},{w:"bear",m:"熊"},{w:"cute",m:"可愛的"},{w:"dog",m:"狗"},{w:"cat",m:"貓"},{w:"apple",m:"蘋果"},{w:"banana",m:"香蕉"},{w:"zebra",m:"斑馬"}];
const AVATARS = {
    M: ['<svg viewBox="0 0 10 10" class="avatar-svg"><path d="M3 2h4v5H3z" fill="#00f2fe"/><path d="M4 3h1v1H4zm1 0h1v1H5z" fill="#000"/></svg>','<svg viewBox="0 0 10 10" class="avatar-svg"><path d="M3 2h4v5H3z" fill="#00f2fe"/><rect x="2" y="3" width="6" height="2" fill="#ff00de"/></svg>','<svg viewBox="0 0 10 10" class="avatar-svg"><path d="M3 1h4v7H3z" fill="#ffd700"/><circle cx="5" cy="5" r="4" fill="none" stroke="#00f2fe"/></svg>'],
    F: ['<svg viewBox="0 0 10 10" class="avatar-svg"><path d="M3 2h4v5H3z" fill="#ff77aa"/><path d="M2 2h6v2H2z" fill="#333"/></svg>','<svg viewBox="0 0 10 10" class="avatar-svg"><path d="M3 2h4v5H3z" fill="#ff77aa"/><rect x="4" y="8" width="2" height="2" fill="#00f2fe"/></svg>','<svg viewBox="0 0 10 10" class="avatar-svg"><path d="M3 1h4v7H3z" fill="#ffd700"/><path d="M2 1h6v2H2z" fill="#ff00de"/></svg>']
};

let state = { id: Date.now().toString(), lv: 1, exp: 0, egg: 0, pets: [], name: "探險家", gen: "M", mastered: [], lastD: "" };
let wordPool = [], curQ = null, dailyC = 0;

function save() { localStorage.setItem("space_master_v101", JSON.stringify(state)); db.ref('leaderboard/' + state.id).set({ n: state.name, l: state.lv, m: state.mastered.length, g: state.gen, t: Date.now() }); }
function load() { const s = localStorage.getItem("space_master_v101"); if(s) state = JSON.parse(s); updateUI(); }
function updateUI() {
    document.getElementById('lv').innerText = state.lv;
    document.getElementById('exp-val').innerText = state.exp;
    document.getElementById('exp-fill').style.width = (state.exp % 100) + "%";
    document.getElementById('egg-val').innerText = state.egg;
    document.getElementById('display-name').innerText = state.name;
    const ts = ["實習生","拾荒者","搜索官","通訊員","拓荒者","單字神"];
    document.getElementById('display-title').innerText = ts[Math.min(Math.floor(state.lv/10), 5)];
    let tier = state.lv >= 36 ? 2 : (state.lv >= 11 ? 1 : 0);
    document.getElementById('player-avatar').innerHTML = AVATARS[state.gen][tier];
    const h = document.getElementById('hatch-hint');
    if(state.mode==='mcq') h.innerText = "⚔️ 連擊挑戰：答錯則歸零！";
    else if(state.mode==='spelling') h.innerText = "🎧 累積挑戰：對10題孵化";
}

function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
function toHome() { window.speechSynthesis.cancel(); showScreen('scr-menu'); updateUI(); }
function showSettings() { showScreen('scr-settings'); document.getElementById('name-in').value = state.name; updateG(); }
function setGender(g) { state.gen = g; updateG(); updateUI(); }
function updateG() { document.getElementById('gen-m').classList.toggle('active', state.gen==='M'); document.getElementById('gen-f').classList.toggle('active', state.gen==='F'); }
function saveSettings() { state.name = document.getElementById('name-in').value || "探險家"; save(); toHome(); }

function showLeaderboard() {
    showScreen('scr-rank'); const list = document.getElementById('rank-list'); list.innerHTML = "接收中...";
    db.ref('leaderboard').orderByChild('l').limitToLast(20).once('value', s => {
        const data = []; s.forEach(c => { data.push(c.val()); }); data.reverse();
        list.innerHTML = data.map((d,i) => `<div class="rank-item"><span>${i+1}. ${d.n}</span><span>LV ${d.l}</span></div>`).join("");
    });
}

function startMode(m) { state.mode = m; state.egg = 0; showScreen('scr-game'); nextQ(); }
function startDaily() { state.mode = "daily"; dailyC = 0; state.egg = 0; showScreen('scr-game'); nextQ(); }

function nextQ() { 
    if (wordPool.length === 0) wordPool = [...WORDS].sort(() => Math.random() - 0.5);
    curQ = wordPool.pop();
    const isS = state.mode === 'spelling';
    document.getElementById('display-q').innerText = isS ? "❓❓❓" : curQ.w;
    document.getElementById('mcq-box').style.display = isS ? 'none' : 'flex';
    document.getElementById('spell-box').style.display = isS ? 'block' : 'none';
    if(!isS) renderMCQ();
    else { document.getElementById('spell-hint').innerText = curQ.m; document.getElementById('spell-in').value = ""; speak(curQ.w); setTimeout(()=>document.getElementById('spell-in').focus(), 400); }
    updateUI();
}

function renderMCQ() {
    let opts = [curQ.m]; while(opts.length<4){ let r = WORDS[Math.floor(Math.random()*WORDS.length)].m; if(!opts.includes(r))opts.push(r);}
    opts.sort(()=>Math.random()-0.5); const box=document.getElementById('mcq-box'); box.innerHTML="";
    opts.forEach(o=>{ const b=document.createElement('button'); b.className='btn-opt'; b.innerText=o; b.onclick=()=>check(o); box.appendChild(b);});
}

function speak(t){ window.speechSynthesis.cancel(); const m=new SpeechSynthesisUtterance(t); m.lang='en-US'; window.speechSynthesis.speak(m); }

function check(ans) {
    const isS = state.mode === 'spelling'; 
    const cor = isS ? curQ.w.toLowerCase() : curQ.m; 
    const inp = (isS ? document.getElementById('spell-in').value : ans).toLowerCase().trim();
    if(inp === cor) {
        state.exp += 30; state.egg++; if(!state.mastered.includes(curQ.w)) state.mastered.push(curQ.w);
        if(state.mode==='daily' && ++dailyC>=15){ state.exp+=100; alert("🎉 每日挑戰完成！"); toHome(); save(); return; }
        if(state.egg >= 10){ const r=Math.floor(Math.random()*PETS.length); state.pets.push(r); state.egg=0; alert(`🐣 孵化：${PETS[r].n}！`); }
    } else {
        if(state.mode==='mcq' || state.mode==='daily') state.egg = 0;
        alert("❌ 錯誤！正確答案: "+(isS?curQ.w:curQ.m));
    }
    if(state.exp >= (state.lv*100)){ state.lv++; alert("🆙 等級提升！裝備進化！"); }
    save(); updateUI(); nextQ();
}

function showLibrary() { showScreen('scr-lib'); const list = document.getElementById('lib-list'); list.innerHTML = state.pets.length ? "" : "尚無夥伴。"; state.pets.forEach(idx => { const p = PETS[idx]; const div = document.createElement('div'); div.className = 'pet-card'; div.innerHTML = `<div class="pet-img-box">${p.s}</div><div class="pet-info"><h4>${p.n}</h4><p>${p.d}</p></div>`; list.appendChild(div); }); }
function showStoryList() { showScreen('scr-story-list'); const list = document.getElementById('story-list'); list.innerHTML = state.pets.length ? "" : "去解鎖夥伴吧！"; [...new Set(state.pets)].sort((a,b)=>a-b).forEach(idx => { const p = PETS[idx]; const div = document.createElement('div'); div.className = 'pet-card'; div.onclick = () => { document.getElementById('story-title').innerText = p.n; document.getElementById('story-content').innerText = p.story; showScreen('scr-story-read'); }; div.innerHTML = `<h4>📖 ${p.n} 航誌</h4>`; list.appendChild(div); }); }

document.getElementById('spell-in').onkeydown=(e)=>{if(e.key==='Enter')check();};
window.onload=load;
</script>
