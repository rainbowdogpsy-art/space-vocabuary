<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>太空單字探險家 v10.2 - 頭像修復版</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #05050d; --neon: #00f2fe; --accent: #ff00de; --glass: rgba(20, 20, 45, 0.95); }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', "Microsoft JhengHei", sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; background-image: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%); }
        #game-container { width: 95%; max-width: 440px; background: var(--glass); backdrop-filter: blur(15px); border-radius: 24px; padding: 20px; border: 1px solid rgba(0, 242, 254, 0.3); text-align: center; position: relative; box-shadow: 0 0 25px rgba(0,0,0,0.5); }
        
        .header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; text-align: left; }
        .avatar-box { width: 64px; height: 64px; background: rgba(0,0,0,0.5); border-radius: 12px; border: 2px solid var(--neon); display: flex; align-items: center; justify-content: center; flex-shrink: 0; overflow: hidden; box-shadow: 0 0 10px rgba(0,242,254,0.3); }
        .avatar-svg { width: 100%; height: 100%; image-rendering: pixelated; }
        .header-content { flex-grow: 1; }
        .lv-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .lv-tag { background: linear-gradient(45deg, #ffd700, #ffa500); color: #000; padding: 2px 10px; border-radius: 50px; font-weight: bold; font-size: 0.75em; }
        .user-title { color: var(--neon); font-size: 0.75em; font-weight: bold; }
        .exp-bg { width: 100%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; border: 1px solid #333; }
        #exp-fill { height: 100%; background: var(--neon); width: 0%; transition: width 0.4s; }

        .screen { display: none; animation: fadeIn 0.3s; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .btn-mode { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.15); padding: 15px; border-radius: 15px; margin-bottom: 8px; cursor: pointer; width: 100%; color: white; transition: 0.2s; }
        .btn-mode:hover { border-color: var(--neon); transform: translateY(-2px); }
        .btn-mode h3 { margin: 0 0 3px 0; font-size: 1.05em; }
        .btn-mode p { margin: 0; font-size: 0.7em; color: #aaa; }

        .arena { height: 110px; display: flex; flex-direction: column; justify-content: center; align-items: center; margin-bottom: 10px; }
        #monster { font-size: 55px; animation: float 3s infinite ease-in-out; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        
        .btn-opt { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); padding: 12px; border-radius: 12px; cursor: pointer; margin-bottom: 8px; width: 100%; }
        .btn-opt:hover { background: var(--neon); color: #000; font-weight: bold; }
        .btn-opt.active { border-color: var(--accent); background: rgba(255,0,222,0.2); color: white; }

        #spell-in { width: 85%; padding: 15px; font-size: 1.6em; text-align: center; border-radius: 15px; border: 2px solid var(--neon); background: #000; color: var(--neon); outline: none; }
        .back-btn { background: rgba(255,255,255,0.1); border: 1px solid #555; color: #fff; cursor: pointer; padding: 6px 15px; border-radius: 8px; font-size: 0.8em; margin-bottom: 10px; }
        .lib-list { display: flex; flex-direction: column; gap: 10px; max-height: 320px; overflow-y: auto; padding: 5px; text-align: left; }
        .pet-card { background: rgba(255, 255, 255, 0.08); border-radius: 15px; padding: 12px; border: 1px solid #444; display: flex; align-items: center; gap: 15px; }
        .pet-info h4 { margin: 0; color: var(--neon); font-size: 1em; }

        .story-box { background: rgba(0,0,0,0.5); border: 1px solid var(--accent); border-radius: 15px; padding: 20px; line-height: 1.8; text-align: left; font-size: 0.9em; max-height: 250px; overflow-y: auto; }
        .rank-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #333; font-size: 0.9em; }
    </style>
</head>

    <div id="scr-rank" class="screen"><div style="text-align:left;"><button class="back-btn" onclick="toHome()">🏠 返回</button></div><h3 style="color:var(--neon);">🏆 全校探險榜</h3><div id="rank-list" class="lib-list">正在接收訊號...</div></div>
    <div id="scr-lib" class="screen"><div style="text-align:left;"><button class="back-btn" onclick="toHome()">🏠 返回</button></div><div id="lib-list" class="lib-list"></div></div>

// --- 夥伴史詩資料庫 ---
const PETS = [
    {n:"太陽小暖",d:"汪汪星暖男，散發正能量。",s:'<svg viewBox="0 0 10 10"><path d="M2 3h1v1H2zm5 0h1v1H7zm-3 4h2v1H4zm-1-3h4v4H3z" fill="#ffd700"/><circle cx="4.5" cy="4.5" r="0.5" fill="#000"/></svg>',story:"【冒險 0-1：初遇暖陽】探險家在恆星軌道邊緣救下了能量微弱的小暖。牠原本是星系核心的守護者，卻被黑洞侵蝕。為了報答你，小暖決定指引你尋找失散在銀河各處的探險隊成員。"},
    {n:"星際貓貓",d:"傲嬌領航員，能預知能源位置。",s:'<svg viewBox="0 0 10 10"><path d="M2 2h1v1H2zm5 0h1v1H7zm-5 2h6v4H2z" fill="#a020f0"/><path d="M3 5h1v1H3zm3 0h1v1H6z" fill="#fff"/></svg>',story:"【冒險 0-2：罐頭星雲】追隨小暖的指引，你在廢棄太空站遇見了貓貓。牠曾是旗艦『語音號』的領航員，正守護著物資。貓貓告訴你，想解開能量封印，必須先找到隱藏在冷卻星雲中的精靈。"},
    {n:"青晶靈",d:"宇宙能量化身，指引方向導師。",s:'<svg viewBox="0 0 10 10"><path d="M3 4h4v5H3zm-1 2h6v2H2z" fill="#00f2fe"/><circle cx="5" cy="6" r="1" fill="#000"/></svg>',story:"【冒險 0-3：能量共鳴】在星雲中，青晶靈現身了。牠用純淨能量重新點亮了飛船核心。透過牠的感應，你們接收到了來自遠方熾熱岩漿星球傳來的微弱求救訊號，大家立刻啟程前去救援。"},
    {n:"火紅岩獸",d:"堅硬石頭，內心害羞。",s:'<svg viewBox="0 0 10 10"><path d="M4 2h2v6H4zM2 4h6v2H2z" fill="#ff3131"/><rect x="4" y="4" width="2" height="2" fill="#fff"/></svg>',story:"【冒險 0-4：岩漿茶會】岩漿星上，火紅岩獸正用身體保護著報廢機器人。牠獨自守護此地數百年，直到遇見你們。岩獸用溫暖的咖啡款待大家，決定加入隊伍，與老友一起征服星際。"},
    {n:"機機器人",d:"內建單字庫，最強學習助教。",s:'<svg viewBox="0 0 10 10"><path d="M3 2h4v5H3zm2 5h2v-1H4z" fill="#888"/><rect x="4" y="3" width="2" height="1" fill="#00f2fe"/></svg>',story:"【冒險 0-5：代碼修復】被岩獸守護的正是在大崩壞中失蹤的機器人。重新開機後，牠同步了宇宙單字資料庫：『學習程序啟動，探險家，讓我們征服這片星系！』"},
    {n:"閃電雲朵",d:"速度極快電系精靈。",s:'<svg viewBox="0 0 10 10"><path d="M2 4h6v2H2zM4 2h2v6H4z" fill="#ffff00"/></svg>',story:"【冒險 0-6：閃電追逐】機器人與愛玩的閃電雲達成協定：只要雲朵幫飛船加速穿過風暴，就分享新奇數據給牠。雲朵開心地成為推進器，飛船速度大幅提升。"},
    {n:"幽靈泡泡",d:"擅長隱身，默默清理垃圾。",s:'<svg viewBox="0 0 10 10"><path d="M3 2h4v6H3z" fill="#e0e0e0" opacity="0.6"/></svg>',story:"【冒險 0-7：隱形的守護】穿過風暴後，泡泡現身了。原來牠一直跟在後面清理留下的垃圾。泡泡擅長偽裝，牠帶領隊伍繞過監視器，潛入了一片充滿氧氣的綠色秘境。"},
    {n:"萌翠種子",d:"草系夥伴，知識轉化森林。",s:'<svg viewBox="0 0 10 10"><path d="M4 8h2V5H4zm-1-3h4v1H3zm2-3h1v2H5z" fill="#32cd32"/></svg>',story:"【冒險 0-8：綠色星球】在秘境核心，萌翠種子因能量不足枯萎。大家協力提供陽光，種子終於開花並釋放氧氣，指引大家前往極寒之地，尋找防衛核心。"},
    {n:"冰晶企鵝",d:"冷靜守衛，守護星系核心。",s:'<svg viewBox="0 0 10 10"><path d="M3 3h4v6H3z" fill="#1e90ff"/><path d="M4 4h1v1H4z" fill="#fff"/></svg>',story:"【冒險 0-9：極低溫保存】極寒之地中，企鵝冷靜守護核心。牠原以為探險家是掠奪者，直到看見種子開出的友誼之花。企鵝卸下武裝加入了你們。"},
    {n:"金屬巨蟹",d:"最強盾牌，擊碎空間壓力。",s:'<svg viewBox="0 0 10 10"><path d="M2 5h6v3H2zM1 4h2v1H1zm6 0h2v1H7z" fill="#ff4500"/></svg>',story:"【冒險 0-10：鋼鐵守衛】當黑洞壓力席捲而來，金屬巨蟹挺身而出，形成最強盾牌。原來所有夥伴集結都是為了這天。大家終於重塑了秩序，準備探索新領域。"},
    {n:"幻影蝶影",d:"穿梭夢境，引導靈魂能量。",s:'<svg viewBox="0 0 10 10"><path d="M2 3h2v4H2zm4 0h2v4H6z" fill="#ff00de"/></svg>',story:"【冒險 0-11：維度裂縫】重塑秩序後，幻影蝶影在裂縫閃現。牠揮動翅膀散發迷幻鱗粉，揭示通往『單字聖殿』的隱藏路徑。黑洞之後竟是全新維度。"},
    {n:"烈焰龍龍",d:"新維度守護神，燃燒鬥志。",s:'<svg viewBox="0 0 10 10"><path d="M2 5h6v4H2zM4 2h2v3H4z" fill="#ff4500"/></svg>',story:"【冒險 0-12：烈焰試煉】在入口，龍龍擋住去路。唯有證明單字量與鬥志才能獲得認可。激戰後龍龍被大家感動，成為隊伍最強大的火力支援。"},
    {n:"時空發條",d:"精準無比，修正時間漏洞。",s:'<svg viewBox="0 0 10 10"><circle cx="5" cy="5" r="4" fill="#cd7f32"/><path d="M5 3v2h2" stroke="white" fill="none"/></svg>',story:"【冒險 0-13：時空修正】新維度時間混亂，時空發條正忙著修復齒輪。牠告訴大家，聖殿大門每百年才開啟一秒，必須依靠牠精準計時才能進入。"},
    {n:"智慧梟梟",d:"紀錄官，知曉全宇宙單字。",s:'<svg viewBox="0 0 10 10"><path d="M3 3h4v6H3z" fill="#708090"/></svg>',story:"【冒險 0-14：遠古圖書館】智慧梟梟在聖殿門口等待著。牠交給你一本空白航誌，並說：『文字是文明火種，收集的夥伴是通往智慧的鑰匙。』"},
    {n:"虹光獨角獸",d:"奇蹟和平象徵，聖殿最終引導。",s:'<svg viewBox="0 0 10 10"><path d="M3 4h4v5H3zM4 2h1v2H4z" fill="#e0ffff"/></svg>',story:"【冒險 0-15：智慧之光】大門開啟，獨角獸踏著彩虹現身。15位夥伴全體集結，聖殿光芒衝雲霄。祝賀你達成偉大成就，現在，你已成為真正的單字大師！"}
];

let state = { id: Date.now().toString(), lv: 1, exp: 0, egg: 0, pets: [], name: "探險家", gen: "M", mastered: [], lastD: "" };

function save() { localStorage.setItem("space_master_v102", JSON.stringify(state)); db.ref('leaderboard/' + state.id).set({ n: state.name, l: state.lv, m: state.mastered.length, g: state.gen, t: Date.now() }); }
function load() { 
    const s = localStorage.getItem("space_master_v102"); 
    if(s) state = JSON.parse(s); 
    state.gen = state.gen || "M"; // 修復頭像沒顯示的核心
