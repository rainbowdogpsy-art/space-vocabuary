<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>太空單字探險家 v7.5 - 彩虹狗狗老師</title>
    <style>
        :root {
            --bg: #05050d; --neon: #00f2fe; --accent: #ff00de; --glass: rgba(20, 20, 45, 0.9);
        }
        body {
            margin: 0; background: var(--bg); color: white;
            font-family: 'Segoe UI', "Microsoft JhengHei", sans-serif;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
            background-image: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
        }
        #game-container {
            width: 90%; max-width: 440px; background: var(--glass);
            backdrop-filter: blur(15px); border-radius: 24px; padding: 20px;
            border: 1px solid rgba(0, 242, 254, 0.3); text-align: center; position: relative;
        }
        .header { margin-bottom: 12px; text-align: left; }
        .lv-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .lv-tag { background: linear-gradient(45deg, #ffd700, #ffa500); color: #000; padding: 3px 12px; border-radius: 50px; font-weight: bold; font-size: 0.8em; }
        .user-title { color: var(--neon); font-size: 0.8em; margin-top: 2px; font-weight: bold; }
        .exp-bg { width: 100%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; border: 1px solid #333; }
        #exp-fill { height: 100%; background: var(--neon); width: 0%; transition: width 0.4s; }

        .screen { display: none; animation: fadeIn 0.3s; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .btn-mode {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            padding: 14px; border-radius: 12px; margin-bottom: 8px; cursor: pointer; transition: 0.2s; width: 100%; color: white;
        }
        .btn-mode:hover { border-color: var(--neon); background: rgba(0,242,254,0.15); transform: translateY(-2px); }
        .btn-mode h3 { margin: 0 0 3px 0; font-size: 1em; }
        .btn-mode p { margin: 0; font-size: 0.7em; color: #aaa; }

        .arena { height: 100px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #monster { font-size: 50px; animation: float 3s infinite ease-in-out; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        
        .btn-opt { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); padding: 12px; border-radius: 12px; cursor: pointer; margin-bottom: 8px; width: 100%; }
        .btn-opt:hover { background: var(--neon); color: #000; font-weight: bold; }
        
        #spell-in { width: 85%; padding: 12px; font-size: 1.5em; text-align: center; border-radius: 15px; border: 2px solid var(--neon); background: #000; color: var(--neon); outline: none; font-family: monospace; }
        input.settings-in { background: #111; border: 1px solid #444; color: white; padding: 10px; border-radius: 8px; width: 80%; margin: 15px 0; text-align: center; }

        .lib-list { display: flex; flex-direction: column; gap: 8px; max-height: 280px; overflow-y: auto; padding: 5px; text-align: left; }
        .pet-card { background: rgba(255, 255, 255, 0.08); border-radius: 15px; padding: 10px; border: 1px solid #444; display: flex; align-items: center; gap: 12px; }
        .pet-svg { width: 35px; height: 35px; image-rendering: pixelated; }

        .back-btn { background: rgba(255,255,255,0.1); border: 1px solid #555; color: #fff; cursor: pointer; padding: 5px 12px; border-radius: 8px; font-size: 0.8em; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="game-container">
    <div class="header">
        <div class="lv-info">
            <div>
                <span class="lv-tag">RANK LV <span id="lv">1</span></span>
                <div id="display-title" class="user-title">萌新實習生</div>
            </div>
            <span style="font-size: 0.8em; color: #888;"><span id="display-name">探險家</span><br>EXP: <span id="exp-val">0</span></span>
        </div>
        <div class="exp-bg"><div id="exp-fill"></div></div>
    </div>

    <div id="scr-menu" class="screen active">
        <h2 style="color:var(--neon); margin-bottom:12px; text-shadow:0 0 10px var(--neon);">🐾 太空探險家 v7.5</h2>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px;">
            <button class="btn-mode" onclick="showSettings()"><h3>🛰️ 角色設定</h3><p>更改名稱與查看稱號</p></button>
            <button class="btn-mode" onclick="showLeaderboard()"><h3>🏆 榮譽榜</h3><p>全校探險排名</p></button>
        </div>
        <button class="btn-mode" onclick="startDaily()" style="background:rgba(255,215,0,0.1); border-color:#ffd700;"><h3>📅 每日挑戰</h3><p id="daily-status">挑戰 15 題領取 100 EXP</p></button>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px;">
            <button class="btn-mode" onclick="startMode('mcq')"><h3>⚔️ 選擇題</h3><p>10連擊解鎖</p></button>
            <button class="btn-mode" onclick="startMode('spelling')"><h3>🎧 拼字戰</h3><p>累積10題解鎖</p></button>
        </div>
        <button class="btn-mode" onclick="showStoryList()"><h3>📖 故事模式</h3><p>解鎖 15 篇航誌</p></button>
        <button class="btn-mode" onclick="showLibrary()"><h3>🐾 夥伴圖鑑</h3><p>查看 15 位夥伴</p></button>
    </div>

    <div id="scr-settings" class="screen">
        <div style="text-align:left;"><button class="back-btn" onclick="toHome()">🏠 返回</button></div>
        <h3 style="color:var(--neon);">角色終端機</h3>
        <p style="font-size:0.9em; color:#aaa;">請輸入探險家名稱：</p>
        <input type="text" id="name-in" class="settings-in" maxlength="10">
        <button class="btn-opt" onclick="updateName()">確認更改</button>
        <div style="margin-top:20px; text-align:left; font-size:0.8em; color:#888;">
            <p>稱號晉升表：</p>
            <p>LV 1-5: 萌新實習生</p>
            <p>LV 6-10: 宇宙拾荒者</p>
            <p>LV 11-20: 單字搜索官</p>
            <p>LV 21-35: 銀河通訊員</p>
            <p>LV 36-50: 星際拓荒者</p>
            <p>LV 51+: 終極單字神</p>
        </div>
    </div>

    <div id="scr-game" class="screen">
        <div style="text-align:left;"><button class="back-btn" onclick="toHome()">🏠 退出</button></div>
        <div id="mode-title" style="color:var(--accent); font-weight:bold; margin-bottom:5px;"></div>
        <div class="arena"><div id="monster">👾</div><h2 id="display-q"></h2></div>
        <div id="mcq-box" style="display:flex; flex-direction:column;"></div>
        <div id="spell-box" style="display:none;"><p id="spell-hint" style="color:var(--accent); font-weight:bold;"></p><input type="text" id="spell-in" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" placeholder="拼寫..."></div>
    </div>

    <div id="scr-rank" class="screen"><div style="text-align:left;"><button class="back-btn" onclick="toHome()">🏠 返回</button></div><h3 style="color:var(--neon);">🏆 星際榮譽榜</h3><div id="rank-list" class="lib-list" style="background:rgba(0,0,0,0.3); border-radius:15px; padding:10px;"></div></div>
    <div id="scr-story-list" class="screen"><div style="text-align:left;"><button class="back-btn" onclick="toHome()">🏠 返回</button></div><div id="story-list" class="lib-list"></div></div>
    <div id="scr-story-read" class="screen"><div style="text-align:left;"><button class="back-btn" onclick="showStoryList()">⬅️ 返回</button></div><h3 id="story-title" style="color:var(--neon);"></h3><div id="story-content" style="background:rgba(0,0,0,0.5); padding:20px; border-radius:15px; border:1px solid var(--accent); line-height:1.6; text-align:left; font-size:0.9em; max-height:200px; overflow-y:auto;"></div></div>
    <div id="scr-lib" class="screen"><div style="text-align:left;"><button class="back-btn" onclick="toHome()">🏠 返回</button></div><div id="lib-list" class="lib-list"></div></div>

    <div style="margin-top:10px; border-top:1px solid #333; padding-top:10px; font-size:0.8em; color:#888;">夥伴能量: <span id="egg-val">0</span> / 10</div>
</div>

<script>
// --- 資料庫 (夥伴/單字) ---
const WORDS = [{w: "afternoon", m: "下午"}, {w: "funny", m: "有趣的"}, {w: "giraffe", m: "長頸鹿"}, {w: "aunt", m: "阿姨"}, {w: "angry", m: "生氣的"}, {w: "animal", m: "動物"}, {w: "ant", m: "螞蟻"}, {w: "arm", m: "手臂"}, {w: "ax", m: "斧頭"}, {w: "bathroom", m: "浴室"}, {w: "bear", m: "熊"}, {w: "cute", m: "可愛的"}, {w: "dog", m: "狗"}, {w: "cat", m: "貓"}, {w: "apple", m: "蘋果"}, {w: "banana", m: "香蕉"}, {w: "zebra", m: "斑馬"}];

const PETS = [
    {n: "太陽小暖", d: "汪汪星守護者，散發穩定能量。", s: '<svg class="pet-svg" viewBox="0 0 10 10"><path d="M2 3h1v1H2zm5 0h1v1H7zm-3 4h2v1H4zm-1-3h4v4H3z" fill="#ffd700"/><path d="M3 4h1v1H3zm3 0h1v1H6z" fill="#000"/></svg>', story: "【冒險 0-1：初遇暖陽】探險家在恆星軌道邊緣救下了能量微弱的小暖。為了報答你，小暖決定指引你尋找失散在銀河各處的探險隊成員。"},
    {n: "星際貓貓", d: "傲嬌領航員，能預知美味能源位置。", s: '<svg class="pet-svg" viewBox="0 0 10 10"><path d="M2 2h1v1H2zm5 0h1v1H7zm-5 2h6v4H2z" fill="#a020f0"/><path d="M3 5h1v1H3zm3 0h1v1H6z" fill="#fff"/></svg>', story: "【冒險 0-2：罐頭星雲】追隨小暖的指引，你在廢棄太空站遇見了貓貓。牠曾是旗艦『語音號』的領航員。貓貓告訴你，想解開能量封印，必須先找到精靈。"},
    {n: "青晶靈", d: "宇宙能量化身，指引方向的導師。", s: '<svg class="pet-svg" viewBox="0 0 10 10"><path d="M3 4h4v5H3zm-1 2h6v2H2z" fill="#00f2fe"/><circle cx="4.5" cy="5.5" r="0.5" fill="#000"/><circle cx="6.5" cy="5.5" r="0.5" fill="#000"/></svg>', story: "【冒險 0-3：能量共鳴】青晶靈用純淨能量重新點亮了飛船核心：『只要心裡有單字，宇宙就沒有邊界。』"},
    {n: "火紅岩獸", d: "堅硬石頭，內心害羞且擅長煮咖啡。", s: '<svg class="pet-svg" viewBox="0 0 10 10"><path d="M4 2h2v6H4zM2 4h6v2H2z" fill="#ff3131"/><rect x="4" y="4" width="2" height="2" fill="#fff"/></svg>', story: "【冒險 0-4：岩漿茶會】在紅色的荒蕪行星上，火紅岩獸邀請你喝杯咖啡。雖然外表堅硬，但牠聊起冒險故事時，火紅的身軀會害羞地閃爍。"},
    {n: "機機器人", d: "內建 300 萬種單字庫，最強助教。", s: '<svg class="pet-svg" viewBox="0 0 10 10"><path d="M3 2h4v5H3zm2 5h2v-1H4z" fill="#888"/><rect x="4" y="3" width="2" height="1" fill="#00f2fe"/></svg>', story: "【冒險 0-5：代碼修復】重新開機後，牠同步了全宇宙單字資料庫：『學習程序啟動，探險家，讓我們征服這片星系！』"},
    {n: "閃電雲朵", d: "速度極快的電系精靈，喜歡捉迷藏。", s: '<svg class="pet-svg" viewBox="0 0 10 10"><path d="M2 4h6v2H2zM4 2h2v6H4z" fill="#ffff00"/><path d="M3 4h4v1H3z" fill="#000"/></svg>', story: "【冒險 0-6：閃電追逐】機器人與雲朵達成協定：只要雲朵幫飛船加速穿過風暴，就分享星際數據給牠。"},
    {n: "幽靈泡泡", d: "擅長隱身的守護者，默默清理廢墟。", s: '<svg class="pet-svg" viewBox="0 0 10 10"><path d="M3 2h4v6H3zm-1 3h6v3H2z" fill="#e0e0e0" opacity="0.6"/><circle cx="4" cy="4" r="0.5" fill="#000"/></svg>', story: "【冒險 0-7：隱形的守護】泡泡現身了。原來牠一直跟在後面清理垃圾。牠帶領隊伍繞過監視器，潛入了一片綠色秘境。"},
    {n: "萌翠種子", d: "草系夥伴，將知識轉化為森林之力。", s: '<svg class="pet-svg" viewBox="0 0 10 10"><path d="M4 8h2V5H4zm-1-3h4v1H3zm2-3h1v2H5z" fill="#32cd32"/></svg>', story: "【冒險 0-8：綠色星球】種子開花並釋放純淨氧氣，牠指引大家前往極寒之地，尋找失傳已久的最後防衛核心。"},
    {n: "冰晶企鵝", d: "冷靜守衛，守護星系防衛核心。", s: '<svg class="pet-svg" viewBox="0 0 10 10"><path d="M3 3h4v6H3z" fill="#1e90ff"/><path d="M4 4h1v1H4zm1 0h1v1H5z" fill="#fff"/></svg>', story: "【冒險 0-9：極低溫保存】企鵝原以為探險家是掠奪者，直到看見種子開出的友誼之花。企鵝卸下武裝加入了你們。"},
    {n: "金屬巨蟹", d: "最強盾牌，能擊碎空間壓力。", s: '<svg class="pet-svg" viewBox="0 0 10 10"><path d="M2 5h6v3H2zM1 4h2v1H1zm6 0h2v1H7z" fill="#ff4500"/></svg>', story: "【冒險 0-10：鋼鐵守衛】當黑洞壓力席捲而來，金屬巨蟹挺身而出，形成最強盾牌。原來所有夥伴集結都是為了這天。"},
    {n: "幻影蝶影", d: "能穿梭夢境，引導靈魂能量。", s: '<svg class="pet-svg" viewBox="0 0 10 10"><path d="M2 3h2v4H2zM6 3h2v4H6zM4
